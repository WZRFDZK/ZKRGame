let checkpointWorld = 0;        // monde où l'on respawn après un Game Over (toujours le début de ce monde)
let checkpointScore = 0;        // score restauré à ce checkpoint
let mapCursorWorld = 0, mapCursorLevel = 0;
let mapReturnsToPlay = false;   // true si la carte a été ouverte en pause depuis une partie en cours
let stateBeforeCharacter = STATE_MENU; // état vers lequel revenir en quittant l'écran de personnage (menu OU en plein niveau)

// ===================== SAUVEGARDE (localStorage) =====================
// Sauvegarde la progression pour ne pas tout perdre au rechargement de la page.
const SAVE_KEY = 'zkr_save_v1';
let savedData = null;

function saveGame(){
  try{
    const data = {
      worldIndex, levelIndex, lives, score,
      unlockedFlat, checkpointWorld, checkpointScore,
      currentCharacterId, isMobile,
      totalCoinsAllTime, bossesDefeated, worldsCompletedCount, victoriesCount,
      // On ne sauvegarde "playing" que si une partie est réellement en cours, pour reprendre pile dans le niveau au reload
      resumeState: (state === STATE_PLAYING) ? 'playing' : 'menu'
    };
    localStorage.setItem(SAVE_KEY, JSON.stringify(data));
  } catch(e) { /* localStorage indisponible : on continue sans sauvegarder */ }
}

function loadGame(){
  try{
    const raw = localStorage.getItem(SAVE_KEY);
    if(!raw) return null;
    return JSON.parse(raw);
  } catch(e) { return null; }
}

function applySavedData(d){
  if(!d) return;
  worldIndex = d.worldIndex ?? 0;
  levelIndex = d.levelIndex ?? 0;
  lives = d.lives ?? 3;
  score = d.score ?? 0;
  unlockedFlat = d.unlockedFlat ?? 0;
  checkpointWorld = d.checkpointWorld ?? 0;
  checkpointScore = d.checkpointScore ?? 0;
  currentCharacterId = d.currentCharacterId ?? 'zkr';
  totalCoinsAllTime = d.totalCoinsAllTime ?? 0;
  bossesDefeated = d.bossesDefeated ?? 0;
  worldsCompletedCount = d.worldsCompletedCount ?? 0;
  victoriesCount = d.victoriesCount ?? 0;
}

function initLevel(){
  level = generateLevel(worldIndex, levelIndex);
  player.reset(level.startX, level.startY);
  enemies = level.enemyData.map(e => new Enemy(e.x, e.y, e.left, e.right, e.speed, {
    ...e, kind: e.isBoss ? BOSS_KINDS[worldIndex] : ENEMY_KINDS[worldIndex]
  }));
  projectiles = [];
  cameraX = 0;
  livesLostThisLevel = 0;
}

// Fait progresser le jeu après un écran de fin de niveau (appelé quand le joueur choisit "Continuer")
function advanceAfterLevelClear(){
  levelIndex++;
  if(levelIndex >= LEVELS_PER_WORLD){
    levelIndex = 0; worldIndex++; worldsCompletedCount++;
    if(worldIndex >= WORLD_THEMES.length){
      unlockedFlat = FLAT(WORLD_THEMES.length - 1, LEVELS_PER_WORLD - 1);
      state = STATE_VICTORY; victoriesCount++;
    } else {
      checkpointWorld = worldIndex; checkpointScore = score; // nouveau monde = nouveau checkpoint
      unlockedFlat = Math.max(unlockedFlat, FLAT(worldIndex, levelIndex));
      initLevel(); state = STATE_PLAYING;
    }
  } else {
    unlockedFlat = Math.max(unlockedFlat, FLAT(worldIndex, levelIndex));
    initLevel(); state = STATE_PLAYING;
  }
  saveGame();
}

// Relance le niveau qu'on vient de terminer (bouton "Rejouer" de l'écran de fin de niveau)
function retryCurrentLevel(){
  lives = 3;
  initLevel();
  state = STATE_PLAYING;
  saveGame();
}

function startNewGame(){
  worldIndex = 0; levelIndex = 0; lives = 3; score = 0;
  unlockedFlat = 0; checkpointWorld = 0; checkpointScore = 0;
  state = STATE_PLAYING; initLevel();
  saveGame();
}

function respawnAtCheckpoint(){
  // Un Game Over ne renvoie jamais avant le début du monde en cours (ex: mort dans le désert -> on reste dans le désert)
  worldIndex = checkpointWorld; levelIndex = 0; lives = 3; score = checkpointScore;
  state = STATE_PLAYING; initLevel();
  saveGame();
}

function openMap(fromPause){
  mapCursorWorld = worldIndex; mapCursorLevel = levelIndex;
  mapReturnsToPlay = !!fromPause;
  state = STATE_MAP;
}

function tryLaunchFromMap(){
  const flat = FLAT(mapCursorWorld, mapCursorLevel);
  if(flat > unlockedFlat) return; // niveau encore verrouillé
  worldIndex = mapCursorWorld; levelIndex = mapCursorLevel; lives = 3;
  checkpointWorld = mapCursorWorld; checkpointScore = score;
  state = STATE_PLAYING; initLevel();
  saveGame();
}

// fromPlay = true quand l'écran perso est ouvert en pause depuis une partie en cours (accessible en plein niveau)
function openCharacterSelect(fromPlay){
  stateBeforeCharacter = fromPlay ? STATE_PLAYING : STATE_MENU;
  charCursor = Math.max(0, CHARACTERS.findIndex(c => c.id === currentCharacterId));
  state = STATE_CHARACTER;
}

function trySelectCharacter(){
  const c = CHARACTERS[charCursor];
  if(c && c.isUnlocked()){ currentCharacterId = c.id; saveGame(); }
}

// Attaque à distance : tire un projectile dans la direction où regarde le joueur.
// Limité par un cooldown (SHOOT_COOLDOWN) pour éviter le spam. Fonctionne au sol comme en l'air.
function tryShoot(){
  if(state !== STATE_PLAYING || player.shootCooldown > 0) return;
  const char = getCharacter(currentCharacterId);
  const originX = player.facing > 0 ? player.x + player.w : player.x - 16;
  const originY = player.y + player.h * 0.42;
  projectiles.push(new Projectile(originX, originY, player.facing, char.palette.accentLight));
  player.shootCooldown = SHOOT_COOLDOWN;
}

// ===================== GESTION DES ENTRÉES (clavier ET boutons tactiles) =====================
// Toute la logique de "quelle touche déclenche quelle action selon l'état du jeu" est centralisée
// ici, pour être appelée aussi bien par un vrai événement clavier que par un bouton tactile.
function onKeyPress(key){
  if(state === STATE_DEVICE){
    return; // le choix d'appareil se fait via les boutons HTML, pas au clavier
  } else if(state === STATE_MENU){
    if(key === ' ') startNewGame();
    else if(key === 'm' || key === 'M') openMap(false);
    else if(key === 'c' || key === 'C') openCharacterSelect(false);
  } else if(state === STATE_GAME_OVER){
    if(key === ' ') respawnAtCheckpoint();
    else if(key === 'm' || key === 'M') openMap(false);
  } else if(state === STATE_VICTORY){
    if(key === ' ') startNewGame();
    else if(key === 'm' || key === 'M') openMap(false);
  } else if(state === STATE_PLAYING){
    if(key === 'Escape') openMap(true);
    else if(key === 'c' || key === 'C') openCharacterSelect(true);
  } else if(state === STATE_LEVEL_CLEAR){
    if(key === ' ' || key === 'Enter') advanceAfterLevelClear();
    else if(key === 'r' || key === 'R' || key === 'e' || key === 'E') retryCurrentLevel();
    else if(key === 'm' || key === 'M' || key === 'Escape') openMap(false);
  } else if(state === STATE_MAP){
    if(key === 'ArrowLeft') mapCursorLevel = Math.max(0, mapCursorLevel - 1);
    else if(key === 'ArrowRight') mapCursorLevel = Math.min(LEVELS_PER_WORLD - 1, mapCursorLevel + 1);
    else if(key === 'ArrowUp') mapCursorWorld = Math.max(0, mapCursorWorld - 1);
    else if(key === 'ArrowDown') mapCursorWorld = Math.min(WORLD_THEMES.length - 1, mapCursorWorld + 1);
    else if(key === ' ' || key === 'Enter') tryLaunchFromMap();
    else if(key === 'Escape') state = mapReturnsToPlay ? STATE_PLAYING : STATE_MENU;
  } else if(state === STATE_CHARACTER){
    if(key === 'ArrowLeft') charCursor = Math.max(0, charCursor - 1);
    else if(key === 'ArrowRight') charCursor = Math.min(CHARACTERS.length - 1, charCursor + 1);
    else if(key === ' ' || key === 'Enter') trySelectCharacter();
    else if(key === 'Escape') state = stateBeforeCharacter;
  }
}

const HANDLED_KEYS = [' ', 'ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', 'Escape'];
window.addEventListener('keydown', e => {
  if(HANDLED_KEYS.includes(e.key)) e.preventDefault(); // évite que la page défile pendant qu'on joue
  const isNewPress = !keys[e.key];
  keys[e.key] = true;
  if(isNewPress) onKeyPress(e.key); // une seule action par pression, pas de répétition en boucle
});
window.addEventListener('keyup', e => { keys[e.key] = false; });
window.addEventListener('blur', () => { keys = {}; }); // évite les touches "bloquées" si la fenêtre perd le focus

// On force le clic sur le canvas à donner le focus
canvas.addEventListener('click', () => { canvas.focus(); });

// ---- Écran de choix d'appareil (PC ou mobile), affiché au tout premier lancement ----
const deviceOverlay = document.getElementById('deviceOverlay');
const touchControls = document.getElementById('touchControls');
const hintEl = document.getElementById('hint');

function chooseDevice(mobile){
  isMobile = mobile;
  deviceOverlay.classList.add('hidden');
  // Déverrouille l'audio pendant ce clic (geste utilisateur) pour que les musiques puissent démarrer sans être bloquées par le navigateur.
  Object.values(MUSIC).forEach(a => { a.play().then(() => a.pause()).catch(() => {}); });
  if(isMobile){
    touchControls.classList.add('active');
    hintEl.textContent = 'Boutons en bas : bouger / sauter / s\'accroupir / TIR à distance  |  ☰ : carte des niveaux / personnages';
  } else {
    touchControls.classList.remove('active');
  }
  // Si une sauvegarde existe et qu'une partie était en cours, on reprend directement dans le niveau (le monde/niveau/vies/score sont déjà restaurés plus bas)
  state = (savedData && savedData.resumeState === 'playing') ? STATE_PLAYING : STATE_MENU;
  saveGame();
  canvas.focus();
}
document.getElementById('btnMobile').addEventListener('click', () => chooseDevice(true));
document.getElementById('btnPC').addEventListener('click', () => chooseDevice(false));

// ---- Boutons tactiles : ils pilotent le même objet `keys` que le clavier ----
function bindTouchButton(id, key){
  const el = document.getElementById(id);
  const press = (ev) => {
    ev.preventDefault();
    if(!keys[key]) onKeyPress(key);
    keys[key] = true;
  };
  const release = (ev) => { if(ev) ev.preventDefault(); keys[key] = false; };
  el.addEventListener('pointerdown', press);
  el.addEventListener('pointerup', release);
  el.addEventListener('pointerleave', release);
  el.addEventListener('pointercancel', release);
}
bindTouchButton('tcLeft', 'ArrowLeft');
bindTouchButton('tcRight', 'ArrowRight');
bindTouchButton('tcDown', 'ArrowDown');
bindTouchButton('tcJump', ' ');
bindTouchButton('tcShoot', 'e');
// Le bouton "menu" agit comme Échap en jeu, et comme retour dans les écrans de menu/carte/perso
document.getElementById('tcMenu').addEventListener('pointerdown', (ev) => {
  ev.preventDefault();
  if(state === STATE_PLAYING) onKeyPress('Escape');
  else if(state === STATE_MAP || state === STATE_CHARACTER) onKeyPress('Escape');
  else if(state === STATE_MENU) openMap(false);
  else if(state === STATE_LEVEL_CLEAR) onKeyPress('m');
});
document.getElementById('tcPerso').addEventListener('pointerdown', (ev) => {
  ev.preventDefault();
  if(state === STATE_MENU) openCharacterSelect(false);
  else if(state === STATE_PLAYING) openCharacterSelect(true);
});

function drawCenterText(lines, offset=0){
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  let startY = (HEIGHT - lines.length * 34)/2 + offset;
  lines.forEach((l, i) => {
    ctx.font = l[1] ? 'bold 32px Arial' : '18px Arial';
    ctx.fillStyle = l[1] ? '#fff' : '#bbb';
    ctx.fillText(l[0], WIDTH/2, startY + i*34 + 17);
  });
}

// Petit bouton "pilule" réutilisable pour les écrans de fin de niveau (façon UI kit : fond dégradé, contour, libellé + touche)
function drawPanelButton(x, y, w, h, label, hint, theme, primary){
  ctx.save();
  const g = ctx.createLinearGradient(0, y, 0, y+h);
  if(primary){ g.addColorStop(0, rgb(theme.accent.map(c => Math.min(255, c+35)))); g.addColorStop(1, rgb(theme.accent)); }
  else { g.addColorStop(0, 'rgba(255,255,255,0.14)'); g.addColorStop(1, 'rgba(255,255,255,0.04)'); }
  ctx.fillStyle = g;
  roundRectPath(x, y, w, h, h/2); ctx.fill();
  ctx.strokeStyle = primary ? 'rgba(255,255,255,0.85)' : 'rgba(255,255,255,0.35)';
  ctx.lineWidth = primary ? 2.5 : 1.6;
  roundRectPath(x, y, w, h, h/2); ctx.stroke();
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = 'bold 15px Arial';
  ctx.fillText(label, x+w/2, y+h/2-7);
  ctx.font = '11px Arial'; ctx.fillStyle = 'rgba(255,255,255,0.78)';
  ctx.fillText(`(${hint})`, x+w/2, y+h/2+11);
  ctx.restore();
}

// Écran de fin de niveau : petite fiche de score façon UI kit (étoiles, score, pièces, boutons), dans la palette du monde en cours
function drawLevelClearPanel(){
  const theme = WORLD_THEMES[Math.min(worldIndex, WORLD_THEMES.length - 1)];
  ctx.save();

  // Fond assombri par-dessus le niveau figé
  ctx.fillStyle = 'rgba(6,4,14,0.6)';
  ctx.fillRect(0, 0, WIDTH, HEIGHT);

  const panelW = 460, panelH = 350;
  const px = (WIDTH - panelW)/2, py = (HEIGHT - panelH)/2 + 10;

  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.55)'; ctx.shadowBlur = 26; ctx.shadowOffsetY = 12;
  const bg = ctx.createLinearGradient(0, py, 0, py+panelH);
  bg.addColorStop(0, '#241b40'); bg.addColorStop(1, '#150f28');
  ctx.fillStyle = bg;
  roundRectPath(px, py, panelW, panelH, 24); ctx.fill();
  ctx.restore();
  ctx.strokeStyle = rgb(theme.accent); ctx.lineWidth = 3;
  roundRectPath(px, py, panelW, panelH, 24); ctx.stroke();

  // Bannière-titre
  const bannerW = 300, bannerH = 46, bannerX = px + panelW/2 - bannerW/2, bannerY = py - 22;
  ctx.fillStyle = rgb(theme.accent);
  roundRectPath(bannerX, bannerY, bannerW, bannerH, 14); ctx.fill();
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 2.5;
  roundRectPath(bannerX, bannerY, bannerW, bannerH, 14); ctx.stroke();
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = 'bold 20px Arial';
  ctx.fillText('NIVEAU RÉUSSI !', bannerX+bannerW/2, bannerY+bannerH/2+1);

  // Étoiles
  const starY = py + 78, starSpacing = 72;
  for(let i=0;i<3;i++){
    const sx = px + panelW/2 + (i-1)*starSpacing;
    const filled = i < levelClearStars;
    drawStar(sx, starY, 27, 11.5, filled ? '#ffd700' : 'rgba(255,255,255,0.12)');
    if(filled) drawStar(sx, starY, 15, 6, '#fff6b0');
  }

  // Score + pièces + vies restantes
  ctx.fillStyle = '#fff'; ctx.font = 'bold 24px Arial';
  ctx.fillText(`SCORE : ${score}`, px+panelW/2, py+142);
  ctx.font = '16px Arial'; ctx.fillStyle = '#e6e6e6';
  ctx.fillText(`🪙 ${levelClearCoins} / ${levelClearCoinsTotal}      ${"❤️".repeat(Math.max(0, lives))}`, px+panelW/2, py+172);

  // Boutons (libellés adaptés au mode tactile ou clavier)
  const hintContinue = isMobile ? 'SAUT' : 'ESPACE';
  const hintRetry = isMobile ? 'TIR' : 'R';
  const hintMap = isMobile ? '☰' : 'M';
  drawPanelButton(px+panelW/2-95, py+204, 190, 48, 'CONTINUER', hintContinue, theme, true);
  drawPanelButton(px+panelW/2-172, py+264, 162, 42, 'REJOUER', hintRetry, theme, false);
  drawPanelButton(px+panelW/2+10, py+264, 162, 42, 'CARTE', hintMap, theme, false);

  ctx.restore();
}

function drawMapScreen(){
  let g = ctx.createLinearGradient(0,0,0,HEIGHT); g.addColorStop(0, '#140f28'); g.addColorStop(1, '#3c2e6b');
  ctx.fillStyle = g; ctx.fillRect(0,0,WIDTH,HEIGHT);

  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = 'bold 26px Arial'; ctx.fillStyle = '#fff';
  ctx.fillText('CARTE DES NIVEAUX', WIDTH/2, 46);

  const cellW = 148, cellH = 84, gapX = 18, gapY = 20;
  const gridW = LEVELS_PER_WORLD * cellW + (LEVELS_PER_WORLD - 1) * gapX;
  const startX = (WIDTH - gridW) / 2;
  const startY = 96;

  for(let w = 0; w < WORLD_THEMES.length; w++){
    const theme = WORLD_THEMES[w];
    const rowY = startY + w * (cellH + gapY);

    ctx.textAlign = 'right'; ctx.font = 'bold 14px Arial'; ctx.fillStyle = rgb(theme.accent);
    ctx.fillText(theme.name, startX - 16, rowY + cellH/2);

    for(let l = 0; l < LEVELS_PER_WORLD; l++){
      const cellX = startX + l * (cellW + gapX);
      const flat = FLAT(w, l);
      const isLocked = flat > unlockedFlat;
      const isCursor = (w === mapCursorWorld && l === mapCursorLevel);
      const isBossCell = l === LEVELS_PER_WORLD - 1;

      ctx.fillStyle = isLocked ? 'rgba(255,255,255,0.06)' : (isBossCell ? 'rgba(200,60,60,0.35)' : rgb(theme.platform));
      roundRectPath(cellX, rowY, cellW, cellH, 10); ctx.fill();

      ctx.strokeStyle = isCursor ? '#ffd700' : (isLocked ? 'rgba(255,255,255,0.15)' : 'rgba(255,255,255,0.4)');
      ctx.lineWidth = isCursor ? 4 : 2;
      roundRectPath(cellX, rowY, cellW, cellH, 10); ctx.stroke();

      ctx.font = isBossCell ? '28px Arial' : 'bold 22px Arial';
      ctx.fillStyle = isLocked ? 'rgba(255,255,255,0.25)' : '#fff';
      ctx.textAlign = 'center';
      if(isLocked){
        ctx.fillText('🔒', cellX + cellW/2, rowY + cellH/2);
      } else if(isBossCell){
        ctx.fillText('💀', cellX + cellW/2, rowY + cellH/2 - 6);
        ctx.font = '11px Arial'; ctx.fillText('BOSS', cellX + cellW/2, rowY + cellH/2 + 20);
      } else {
        ctx.fillText(String(l+1), cellX + cellW/2, rowY + cellH/2);
      }
    }
  }

  ctx.textAlign = 'center'; ctx.font = '15px Arial'; ctx.fillStyle = '#ccc';
  ctx.fillText('Flèches : naviguer   |   ESPACE / ENTRÉE : jouer   |   ÉCHAP : retour', WIDTH/2, HEIGHT - 28);
}

function drawCharacterScreen(){
  let g = ctx.createLinearGradient(0,0,0,HEIGHT); g.addColorStop(0, '#140f28'); g.addColorStop(1, '#3c2e6b');
  ctx.fillStyle = g; ctx.fillRect(0,0,WIDTH,HEIGHT);

  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = 'bold 26px Arial'; ctx.fillStyle = '#fff';
  ctx.fillText('CHOISIS TON PERSONNAGE', WIDTH/2, 42);

  const c = CHARACTERS[charCursor];
  const unlocked = c.isUnlocked();

  // Grande vignette du personnage survolé au centre
  const previewCX = WIDTH/2, previewCY = 190;
  ctx.save();
  if(!unlocked) ctx.globalAlpha = 0.35;
  drawPlayerSprite(previewCX - PLAYER_WIDTH*1.1, previewCY - PLAYER_HEIGHT*1.1, PLAYER_WIDTH*2.2, PLAYER_HEIGHT*2.2, 1, 0, true, false, frameTick, c);
  ctx.restore();

  ctx.font = 'bold 22px Arial'; ctx.fillStyle = unlocked ? '#ffd700' : '#999';
  ctx.fillText(c.name, WIDTH/2, 330);
  ctx.font = '15px Arial'; ctx.fillStyle = '#ccc';
  ctx.fillText(c.theme, WIDTH/2, 356);

  ctx.font = 'bold 15px Arial';
  if(unlocked){
    ctx.fillStyle = c.id === currentCharacterId ? '#7CFC98' : '#fff';
    ctx.fillText(c.id === currentCharacterId ? '✔ ÉQUIPÉ' : 'ESPACE / ENTRÉE : équiper', WIDTH/2, 388);
  } else {
    ctx.fillStyle = '#ff8a6b';
    ctx.fillText('🔒 ' + c.quest, WIDTH/2, 388);
  }

  // Flèches gauche/droite + petites pastilles indiquant la position dans la liste
  ctx.font = 'bold 28px Arial'; ctx.fillStyle = 'rgba(255,255,255,0.5)';
  if(charCursor > 0) ctx.fillText('◀', 70, previewCY);
  if(charCursor < CHARACTERS.length - 1) ctx.fillText('▶', WIDTH-70, previewCY);

  const dotY = 430, dotGap = 22, dotStartX = WIDTH/2 - (CHARACTERS.length-1)*dotGap/2;
  CHARACTERS.forEach((cc, i) => {
    ctx.beginPath();
    ctx.fillStyle = i === charCursor ? '#ffd700' : (cc.isUnlocked() ? 'rgba(255,255,255,0.55)' : 'rgba(255,255,255,0.2)');
    ctx.arc(dotStartX + i*dotGap, dotY, i === charCursor ? 6 : 4, 0, Math.PI*2);
    ctx.fill();
  });

  ctx.font = '15px Arial'; ctx.fillStyle = '#ccc';
  ctx.fillText('Flèches ◀▶ : parcourir   |   ESPACE / ENTRÉE : équiper   |   ÉCHAP : retour', WIDTH/2, HEIGHT - 28);
  ctx.textAlign = 'left';
}

function drawWorldDeco(worldIdx, camX) {
  const theme = WORLD_THEMES[worldIdx];

  // 1. DESSIN DES NUAGES PIXEL-ART
  ctx.fillStyle = rgb(theme.clouds);
  for (let i = 0; i < 6; i++) {
    let x = mod((i * 260 - camX * 0.1), WIDTH + 160) - 160;
    let y = 40 + (i % 3) * 30;
    ctx.fillRect(x, y + 10, 90, 20);
    ctx.fillRect(x + 15, y, 60, 25);
    ctx.fillRect(x + 35, y - 8, 30, 10);
  }

  // 2. DESSIN DU DECOR DE FOND (PARALLAXE)
  ctx.fillStyle = rgb(theme.deco);
  if (worldIdx === 0) { // LA VILLE : Immeubles pixel-art fidèles à l'ambiance
    for (let i = 0; i < 24; i++) {
      let w = 80 + (i % 4) * 25;
      let h = 180 + (i % 3) * 70;
      let x = mod((i * 110 - camX * 0.25), WIDTH + w) - w;
      let y = GROUND_Y - h;
      ctx.fillRect(x, y, w, h);
      
      ctx.fillStyle = "rgba(255, 240, 150, 0.25)";
      for (let fx = x + 12; fx < x + w - 15; fx += 22) {
        for (let fy = y + 20; fy < GROUND_Y - 20; fy += 35) {
          if ((fx * fy + i) % 4 !== 0) ctx.fillRect(fx, fy, 8, 12);
        }
      }
      // antenne de toit
      ctx.strokeStyle = 'rgba(20,16,32,0.6)'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(x+w*0.5, y); ctx.lineTo(x+w*0.5, y-18); ctx.stroke();
      // tag graffiti coloré au pied de certains immeubles
      if(i % 3 === 1){
        ctx.fillStyle = 'rgba(60,140,255,0.4)';
        ctx.font = 'bold 16px Arial';
        ctx.fillText('ZKR', x+w*0.5-16, GROUND_Y-16);
      } else if(i % 5 === 0){
        ctx.strokeStyle = 'rgba(220,60,60,0.4)'; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(x+10, GROUND_Y-14); ctx.lineTo(x+w-10, GROUND_Y-30); ctx.stroke();
      }
      ctx.fillStyle = rgb(theme.deco);
    }
  } 
  else if (worldIdx === 1) { // LE DÉSERT : Dunes et pyramides à capuchon doré + hiéroglyphes
    for (let i = 0; i < 8; i++) {
      let size = 180 + (i % 2) * 100;
      let x = mod((i * 300 - camX * 0.15), WIDTH + size) - size;
      ctx.fillStyle = rgb(theme.deco);
      ctx.beginPath();
      ctx.moveTo(x, GROUND_Y);
      ctx.lineTo(x + size / 2, GROUND_Y - size / 1.5);
      ctx.lineTo(x + size, GROUND_Y);
      ctx.fill();
      // capuchon doré au sommet
      ctx.fillStyle = 'rgba(212,175,55,0.55)';
      ctx.beginPath();
      ctx.moveTo(x + size*0.42, GROUND_Y - size/1.5*0.82);
      ctx.lineTo(x + size/2, GROUND_Y - size/1.5);
      ctx.lineTo(x + size*0.58, GROUND_Y - size/1.5*0.82);
      ctx.fill();
      // lignes d'appareillage + petits hiéroglyphes
      ctx.strokeStyle = 'rgba(90,55,20,0.3)'; ctx.lineWidth = 2;
      for(let ly=1; ly<5; ly++){ const yy = GROUND_Y - (size/1.5)*ly/5; const half = size/2*(1-ly/5.5); ctx.beginPath(); ctx.moveTo(x+size/2-half, yy); ctx.lineTo(x+size/2+half, yy); ctx.stroke(); }
      ctx.fillStyle = 'rgba(90,55,20,0.4)';
      ctx.fillRect(x+size*0.44, GROUND_Y-size/1.5*0.4, 5, 14);
      ctx.beginPath(); ctx.arc(x+size*0.53, GROUND_Y-size/1.5*0.32, 4, 0, Math.PI*2); ctx.fill();
    }
  } 
  else if (worldIdx === 2) { // LA FORÊT : Arbres avec mousse, champignons et lucioles
    for (let i = 0; i < 25; i++) {
      let x = mod((i * 90 - camX * 0.3), WIDTH + 80) - 80;
      let h = 140 + (i % 3) * 40;
      ctx.fillStyle = "rgba(50, 30, 20, 0.4)";
      ctx.fillRect(x + 15, GROUND_Y - h, 10, h);
      ctx.fillStyle = rgb(theme.deco);
      ctx.beginPath(); ctx.moveTo(x - 15, GROUND_Y - h + 40); ctx.lineTo(x + 20, GROUND_Y - h - 30); ctx.lineTo(x + 55, GROUND_Y - h + 40); ctx.fill();
      ctx.beginPath(); ctx.moveTo(x - 5, GROUND_Y - h + 90); ctx.lineTo(x + 20, GROUND_Y - h + 20); ctx.lineTo(x + 45, GROUND_Y - h + 90); ctx.fill();
      // mousse sur le tronc
      if(i % 3 === 0){ ctx.fillStyle = 'rgba(120,190,90,0.35)'; ctx.beginPath(); ctx.arc(x+20, GROUND_Y-18, 10, 0, Math.PI*2); ctx.fill(); }
      // petit champignon rouge au pied de certains arbres
      if(i % 5 === 2){
        ctx.fillStyle = '#c94a3d'; ctx.beginPath(); ctx.arc(x+2, GROUND_Y-10, 7, Math.PI, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#f2f7fb'; ctx.fillRect(x-3, GROUND_Y-9, 4, 2); ctx.fillRect(x+5, GROUND_Y-8, 4, 2);
        ctx.fillStyle = '#e8d9b0'; ctx.fillRect(x-1, GROUND_Y-9, 6, 9);
      }
      // luciole/étincelle
      if(i % 4 === 1){ const g = 0.4+0.4*Math.sin(frameTick*0.05+i); ctx.fillStyle = `rgba(200,255,140,${g})`; ctx.beginPath(); ctx.arc(x+35, GROUND_Y-h*0.5, 3, 0, Math.PI*2); ctx.fill(); }
    }
  } 
  else if (worldIdx === 3) { // LA BANQUISE : Blocs de glace géométriques scintillants
    for (let i = 0; i < 12; i++) {
      let w = 130 + (i % 2) * 80;
      let h = 90 + (i % 3) * 50;
      let x = mod((i * 180 - camX * 0.2), WIDTH + w) - w;
      ctx.fillStyle = rgb(theme.deco);
      ctx.beginPath();
      ctx.moveTo(x, GROUND_Y);
      ctx.lineTo(x + w * 0.3, GROUND_Y - h);
      ctx.lineTo(x + w * 0.7, GROUND_Y - h * 1.2);
      ctx.lineTo(x + w, GROUND_Y);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.beginPath(); ctx.moveTo(x + w*0.3, GROUND_Y - h); ctx.lineTo(x + w*0.45, GROUND_Y - h*0.5); ctx.lineTo(x + w*0.55, GROUND_Y - h*0.9); ctx.closePath(); ctx.fill();
      const spark = 0.3+0.5*Math.abs(Math.sin(frameTick*0.04+i*1.3));
      ctx.fillStyle = `rgba(255,255,255,${spark})`;
      ctx.beginPath(); ctx.arc(x + w*0.65, GROUND_Y - h*0.7, 2.4, 0, Math.PI*2); ctx.fill();
    }
  }
}

function drawGroundTexture(worldIdx, r, camX){
  ctx.save();
  ctx.beginPath(); ctx.rect(r.x, r.y, r.w, Math.min(r.h, 90)); ctx.clip();
  if(worldIdx === 0){ // VILLE : joints de trottoir/béton
    ctx.strokeStyle = 'rgba(15,13,22,0.5)'; ctx.lineWidth = 2;
    for(let x = Math.floor(r.x/70)*70; x < r.x+r.w; x += 70){ ctx.beginPath(); ctx.moveTo(x, r.y+8); ctx.lineTo(x, r.y+70); ctx.stroke(); }
    // petit tag graffiti occasionnel
    ctx.fillStyle = 'rgba(60,140,255,0.55)'; ctx.font = 'bold 13px Arial';
    for(let x = Math.floor(r.x/340)*340; x < r.x+r.w; x += 340){ if(mod(x,680)===0) ctx.fillText('ZKR', x+18, r.y+34); }
  } else if(worldIdx === 1){ // DESERT : appareillage de pierres sableuses
    ctx.strokeStyle = 'rgba(110,70,30,0.35)'; ctx.lineWidth = 2;
    for(let x = Math.floor(r.x/64)*64; x < r.x+r.w; x += 64){ ctx.beginPath(); ctx.moveTo(x, r.y+10); ctx.lineTo(x, r.y+55); ctx.stroke(); }
    for(let y = r.y+10; y < r.y+70; y += 22){ ctx.beginPath(); ctx.moveTo(r.x, y); ctx.lineTo(r.x+r.w, y); ctx.stroke(); }
  } else if(worldIdx === 2){ // FORET : mousse et racines
    ctx.fillStyle = 'rgba(90,160,70,0.5)';
    for(let x = Math.floor(r.x/46)*46; x < r.x+r.w; x += 46){ ctx.beginPath(); ctx.arc(x+10, r.y+8, 9, 0, Math.PI); ctx.fill(); }
    ctx.strokeStyle = 'rgba(50,35,20,0.4)'; ctx.lineWidth = 2;
    for(let x = Math.floor(r.x/58)*58; x < r.x+r.w; x += 58){ ctx.beginPath(); ctx.moveTo(x, r.y+16); ctx.lineTo(x+18, r.y+60); ctx.stroke(); }
  } else if(worldIdx === 3){ // BANQUISE : fissures de glace scintillantes
    ctx.strokeStyle = 'rgba(255,255,255,0.55)'; ctx.lineWidth = 1.6;
    for(let x = Math.floor(r.x/95)*95; x < r.x+r.w; x += 95){ ctx.beginPath(); ctx.moveTo(x, r.y+4); ctx.lineTo(x+22, r.y+30); ctx.lineTo(x+8, r.y+55); ctx.stroke(); }
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    for(let x = Math.floor(r.x/60)*60; x < r.x+r.w; x += 60){ ctx.fillRect(x, r.y+4, 3, 3); }
  }
  ctx.restore();
}

function drawPlatformTexture(worldIdx, r){
  ctx.save();
  ctx.beginPath(); ctx.rect(r.x, r.y, r.w, r.h); ctx.clip();
  if(worldIdx === 0){
    ctx.strokeStyle = 'rgba(0,0,0,0.35)'; ctx.lineWidth = 1.4;
    for(let x = r.x+14; x < r.x+r.w; x += 28){ ctx.beginPath(); ctx.moveTo(x, r.y); ctx.lineTo(x, r.y+r.h); ctx.stroke(); }
  } else if(worldIdx === 1){
    ctx.strokeStyle = 'rgba(90,55,20,0.4)'; ctx.lineWidth = 1.4;
    for(let x = r.x+16; x < r.x+r.w; x += 32){ ctx.beginPath(); ctx.moveTo(x, r.y); ctx.lineTo(x, r.y+r.h); ctx.stroke(); }
  } else if(worldIdx === 2){
    ctx.strokeStyle = 'rgba(40,25,15,0.45)'; ctx.lineWidth = 1.4;
    for(let x = r.x; x < r.x+r.w; x += 10){ ctx.beginPath(); ctx.moveTo(x, r.y+2); ctx.lineTo(x, r.y+r.h-2); ctx.stroke(); }
  } else if(worldIdx === 3){
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.beginPath(); ctx.moveTo(r.x+4, r.y+r.h*0.4); ctx.lineTo(r.x+r.w*0.4, r.y+2); ctx.lineTo(r.x+r.w*0.55,r.y+r.h*0.5); ctx.closePath(); ctx.fill();
  }
  ctx.restore();
}

function damagePlayer(){
  // Ne jamais infliger de dégâts si l'état de jeu a déjà changé (évite les vies négatives / crash sur plusieurs hits au même frame)
  if(state !== STATE_PLAYING) return;
  livesLostThisLevel++;
  lives--;
  if(lives <= 0){ lives = 0; state = STATE_GAME_OVER; saveGame(); }
  else { player.reset(level.startX, level.startY); }
}

function gameLoop(){
  frameTick++;
  if(state === STATE_PLAYING && frameTick % 120 === 0) saveGame(); // autosave ~ toutes les 2 secondes
  if(state === STATE_PLAYING){
    level.movingPlatforms.forEach(mp => mp.update(frameTick));
    player.update(keys, level.solids);
    cameraX += ((player.x - WIDTH/3) - cameraX) * 0.1;
    cameraX = Math.max(0, Math.min(cameraX, level.width - WIDTH));

    // Attaque à distance : maintenir E (ou le bouton TIR tactile) tire en continu, limité par le cooldown
    if(keys['e'] || keys['E']) tryShoot();

    if(player.y > DEATH_Y) damagePlayer();
    level.coins.forEach(c => { if(!c.taken && Math.hypot(player.x+player.w/2 - c.x, player.y+player.h/2 - c.y) < 35){ c.taken = true; score++; totalCoinsAllTime++; } });
    enemies.forEach(e => {
      if(state !== STATE_PLAYING || !e.alive) return;
      e.update();
      if(rectsOverlap(player.rect, e.rect)){
        if(player.vy > 0 && player.y + player.h - player.vy <= e.y + 15){
          e.hit(); player.vy = -10;
          score += e.alive ? 1 : (e.isBoss ? 20 : 2);
          if(e.isBoss && !e.alive) bossesDefeated++;
        } else if(player.invincibleTimer <= 0){ damagePlayer(); }
      }
    });

    // Mise à jour des projectiles : déplacement, disparition sur mur/expiration, et dégâts aux ennemis
    // (même effet qu'un saut sur la tête : élimine les petits mobs en un coup, inflige 1 point de dégât aux boss).
    projectiles.forEach(p => { if(!p.dead) p.update(level.solids); });
    enemies.forEach(e => {
      if(!e.alive) return;
      for(const p of projectiles){
        if(!p.dead && rectsOverlap(p.rect, e.rect)){
          p.dead = true;
          e.hit();
          score += e.alive ? 1 : (e.isBoss ? 20 : 2);
          if(e.isBoss && !e.alive) bossesDefeated++;
          break;
        }
      }
    });
    projectiles = projectiles.filter(p => !p.dead);

    if(state === STATE_PLAYING){
      level.spikes.forEach(s => { if(state === STATE_PLAYING && rectsOverlap(player.rect, s) && player.invincibleTimer <= 0) damagePlayer(); });
    }
    // Barrière de boss : tant que le boss du niveau est vivant, un mur invisible empêche
    // physiquement d'atteindre le drapeau (on ne peut pas "skip" le combat).
    const bossAlive = enemies.some(e => e.isBoss && e.alive);
    if(level.bossBarrierX != null && bossAlive && player.x + player.w > level.bossBarrierX){
      player.x = level.bossBarrierX - player.w;
      if(player.vx > 0) player.vx = 0;
    }
    if(state === STATE_PLAYING && !bossAlive && player.x + player.w > level.goalX && Math.abs((player.y + player.h) - level.goalY) < 120){
      // Calcul des étoiles : 1 pour avoir fini le niveau, +1 si aucune vie perdue, +1 si toutes les pièces ramassées
      const coinsTotal = level.coins.length;
      const coinsCollected = level.coins.filter(c => c.taken).length;
      let stars = 1;
      if(livesLostThisLevel === 0) stars++;
      if(coinsTotal === 0 || coinsCollected === coinsTotal) stars++;
      levelClearStars = stars; levelClearCoins = coinsCollected; levelClearCoinsTotal = coinsTotal;
      state = STATE_LEVEL_CLEAR;
    }
  }

  const tcPersoEl = document.getElementById('tcPerso');
  if(tcPersoEl) tcPersoEl.classList.toggle('show', isMobile && (state === STATE_MENU || state === STATE_PLAYING));

  updateMusic();

  ctx.clearRect(0,0,WIDTH,HEIGHT);
  const theme = WORLD_THEMES[Math.min(worldIndex, WORLD_THEMES.length - 1)];

  if(state === STATE_DEVICE){
    // Le fond reste simple : la vraie interface de choix est la surcouche HTML #deviceOverlay au-dessus du canvas.
    let g = ctx.createLinearGradient(0,0,0,HEIGHT); g.addColorStop(0, '#140f28'); g.addColorStop(1, '#3c2e6b'); ctx.fillStyle = g; ctx.fillRect(0,0,WIDTH,HEIGHT);
  } else if(state === STATE_MENU){
    let g = ctx.createLinearGradient(0,0,0,HEIGHT); g.addColorStop(0, '#140f28'); g.addColorStop(1, '#3c2e6b'); ctx.fillStyle = g; ctx.fillRect(0,0,WIDTH,HEIGHT);
    drawPlayerSprite(WIDTH/2 - PLAYER_WIDTH*0.8, HEIGHT/2 - 150, PLAYER_WIDTH*1.6, PLAYER_HEIGHT*1.6, 1, 0, true, false, frameTick, getCharacter(currentCharacterId));
    drawCenterText(isMobile ? [
      ['ZKR - LE BOSS DE LA STREET', true],
      ['Bouton SAUT : lancer le jeu', false],
      ['Bouton TIR : attaque à distance', false],
      ['Bouton ☰ : carte des niveaux', false],
      [`Personnage : ${getCharacter(currentCharacterId).name}`, false]
    ] : [
      ['ZKR - LE BOSS DE LA STREET', true],
      ['Appuie sur ESPACE pour lancer le jeu', false],
      ['E : tir à distance   |   M : carte du monde', false],
      [`Appuie sur C pour choisir ton personnage (actuel : ${getCharacter(currentCharacterId).name})`, false]
    ], 20);
  } else if(state === STATE_MAP){
    drawMapScreen();
  } else if(state === STATE_CHARACTER){
    drawCharacterScreen();
  } else if(state === STATE_VICTORY){
    // Écran de victoire dédié : on a fini le monde 4, worldIndex peut être hors des bornes de WORLD_THEMES,
    // donc on ne tente plus de dessiner un niveau de jeu ici (ça faisait planter le jeu).
    let g = ctx.createLinearGradient(0,0,0,HEIGHT); g.addColorStop(0, '#1a4d2e'); g.addColorStop(1, '#2e8b57'); ctx.fillStyle = g; ctx.fillRect(0,0,WIDTH,HEIGHT);
  } else {
    let g = ctx.createLinearGradient(0,0,0,HEIGHT); g.addColorStop(0, rgb(theme.bgTop)); g.addColorStop(1, rgb(theme.bgBottom)); ctx.fillStyle = g; ctx.fillRect(0,0,WIDTH,HEIGHT);
    
    drawWorldDeco(worldIndex, cameraX);

    ctx.save(); ctx.translate(-cameraX, 0);
    level.groundRects.forEach(r => { ctx.fillStyle = rgb(theme.ground); ctx.fillRect(r.x, r.y, r.w, r.h); ctx.fillStyle = rgb(theme.groundTop); ctx.fillRect(r.x, r.y, r.w, 10); drawGroundTexture(worldIndex, r, cameraX); });
    level.platformRects.forEach(r => {
      ctx.fillStyle = rgb(theme.platform); ctx.fillRect(r.x, r.y, r.w, r.h);
      ctx.fillStyle = rgb(theme.platformTop); ctx.fillRect(r.x, r.y, r.w, 6);
      drawPlatformTexture(worldIndex, r);
      if(r instanceof MovingPlatform){
        // Liseré accent + petites flèches pour signaler que la plateforme bouge et indiquer son axe
        ctx.save();
        ctx.strokeStyle = rgb(theme.accent); ctx.lineWidth = 2;
        ctx.strokeRect(r.x+1, r.y+1, r.w-2, r.h-2);
        ctx.fillStyle = rgb(theme.accent);
        ctx.font = 'bold 11px Arial'; ctx.textAlign = 'center';
        const arrow = r.axis === 'x' ? '\u2194' : '\u2195';
        ctx.fillText(arrow, r.x + r.w/2, r.y + r.h/2 + 4);
        ctx.textAlign = 'left';
        ctx.restore();
      }
    });
    ctx.fillStyle = rgb(theme.spike); level.spikes.forEach(r => { for(let x=r.x; x<r.x+r.w; x+=20){ ctx.beginPath(); ctx.moveTo(x, r.y+r.h); ctx.lineTo(x+10, r.y); ctx.lineTo(x+20, r.y+r.h); ctx.fill(); } });
    level.coins.forEach(c => { if(!c.taken){ drawStar(c.x, c.y, 10, 4.5, '#ffd700'); drawStar(c.x, c.y, 6, 2.5, '#fff6b0'); } });
    projectiles.forEach(p => {
      ctx.save();
      ctx.fillStyle = p.color;
      ctx.shadowColor = p.color; ctx.shadowBlur = 8;
      // petite traînée derrière le projectile pour renforcer la sensation de vitesse
      ctx.globalAlpha = 0.35;
      ctx.fillRect(p.x - p.dir*14, p.y+2, 12, p.h-4);
      ctx.globalAlpha = 1;
      roundRectPath(p.x, p.y, p.w, p.h, p.h/2); ctx.fill();
      ctx.restore();
    });
    enemies.forEach(e => {
      if(!e.alive) return;
      ctx.save();
      if(e.hitFlash > 0) ctx.globalAlpha = 0.55;
      if(e.isBoss) drawBossSprite(e.kind, e.x, e.y, e.w, e.h, frameTick, e.dir);
      else drawEnemySprite(e.kind, e.x, e.y, e.w, e.h, frameTick, e.dir);
      ctx.restore();
    });
    // fanion d'arrivée
    ctx.fillStyle = '#3a3a3a'; ctx.fillRect(level.goalX-5, level.goalY-140, 8, 140);
    ctx.fillStyle = rgb(theme.accent);
    ctx.beginPath(); ctx.moveTo(level.goalX+3, level.goalY-140); ctx.lineTo(level.goalX+68, level.goalY-120); ctx.lineTo(level.goalX+3, level.goalY-100); ctx.fill();
    if(level.bossBarrierX != null && enemies.some(e => e.isBoss && e.alive)){
      drawBossBarrier(level.bossBarrierX, theme, frameTick);
    }
    ctx.restore();

    if(player.invincibleTimer <= 0 || player.invincibleTimer % 8 < 5){
      drawPlayerSprite(player.x - cameraX, player.y, player.w, player.h, player.facing, player.vx, player.onGround, player.h === PLAYER_CROUCH_HEIGHT, frameTick, getCharacter(currentCharacterId));
    }
    
    ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(0,0,WIDTH,50); ctx.fillStyle = '#fff'; ctx.font = 'bold 16px Arial';
    ctx.fillText(`VIES : ${"❤️".repeat(Math.max(0, lives))}   |   SCORE : ${score}`, 20, 30);
    ctx.textAlign = 'right'; ctx.fillText(`${theme.name} - ${LEVEL_NAMES[levelIndex]}   |   ÉCHAP : carte`, WIDTH - 20, 30); ctx.textAlign = 'left';

    const boss = enemies.find(e => e.isBoss && e.alive);
    if(boss){
      const barW = 340, barX = (WIDTH-barW)/2, barY = 66;
      const bossName = BOSS_NAMES[Math.min(worldIndex, BOSS_NAMES.length-1)];
      ctx.save();
      ctx.fillStyle = 'rgba(0,0,0,0.62)'; roundRectPath(barX-16, barY-30, barW+32, 54, 8); ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 1; ctx.stroke();
      ctx.font = 'bold 14px Arial'; ctx.textAlign = 'center'; ctx.fillStyle = '#fff';
      ctx.fillText(`💀 ${bossName} 💀`, barX+barW/2, barY-12);
      ctx.textAlign = 'left';
      ctx.fillStyle = '#3a0d0d'; roundRectPath(barX, barY, barW, 14, 4); ctx.fill();
      const hpRatio = boss.hp/boss.maxHp;
      const hpGrad = ctx.createLinearGradient(barX,0,barX+barW,0);
      hpGrad.addColorStop(0, '#ff5a3c'); hpGrad.addColorStop(1, '#ffcf3c');
      ctx.fillStyle = hpGrad; roundRectPath(barX, barY, Math.max(barW * hpRatio, hpRatio>0?6:0), 14, 4); ctx.fill();
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.4; roundRectPath(barX, barY, barW, 14, 4); ctx.stroke();
      ctx.restore();
    }

    if(state === STATE_LEVEL_CLEAR) drawLevelClearPanel();
  }
  
  if(state === STATE_GAME_OVER) drawCenterText([
    ['GAME OVER', true],
    [`ESPACE : rejouer depuis ${WORLD_THEMES[checkpointWorld].name}`, false],
    ['M : carte des niveaux', false]
  ]);
  if(state === STATE_VICTORY) drawCenterText([
    ['VICTOIRE TOTALE !', true],
    ['Tu as fini le jeu !', false],
    ['ESPACE : nouvelle partie   |   M : carte des niveaux', false]
  ]);

  requestAnimationFrame(gameLoop);
}

// ---- Chargement de la sauvegarde au démarrage ----
savedData = loadGame();
applySavedData(savedData);

// Sauvegarde automatique régulière pendant qu'on joue (au cas où la page serait rechargée/fermée en plein niveau)
// et systématiquement juste avant de quitter/recharger la page.
window.addEventListener('beforeunload', saveGame);

initLevel();
gameLoop();
</script>
