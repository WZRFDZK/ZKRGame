<script>
const WIDTH = 960, HEIGHT = 540;
const GRAVITY = 0.85, MAX_FALL = 18, JUMP_VELOCITY = -16.5, MOVE_SPEED = 5.2;
const GROUND_Y = 460, DEATH_Y = 680;
const PLAYER_WIDTH = 42, PLAYER_HEIGHT = 76, PLAYER_CROUCH_HEIGHT = 46;
const SHOOT_COOLDOWN = 20, PROJECTILE_SPEED = 11.5, PROJECTILE_LIFE = 70;

const WORLD_THEMES = [
  { name: "LA VILLE", bgTop: [18,14,38], bgBottom: [55,46,88], ground: [35,33,48], groundTop: [70,68,92], platform: [80,78,100], platformTop: [110,108,135], spike: [180,180,190], enemy: [25,25,25], accent: [60,140,255], deco: [32,26,53], clouds: [75,65,105] },
  { name: "LE DÉSERT", bgTop: [245,160,80], bgBottom: [255,215,130], ground: [196,148,84], groundTop: [224,178,110], platform: [170,122,70], platformTop: [206,160,100], spike: [120,80,45], enemy: [150,90,40], accent: [230,140,40], deco: [160,110,60], clouds: [255,240,210] },
  { name: "LA FORÊT", bgTop: [15,45,25], bgBottom: [45,95,55], ground: [60,90,45], groundTop: [90,130,60], platform: [100,75,50], platformTop: [60,140,70], spike: [90,60,40], enemy: [35,90,45], accent: [120,200,90], deco: [30,65,40], clouds: [80,120,95] },
  { name: "LA BANQUISE", bgTop: [120,175,210], bgBottom: [200,225,240], ground: [180,210,225], groundTop: [235,245,255], platform: [150,185,210], platformTop: [215,230,245], spike: [130,180,210], enemy: [110,145,180], accent: [90,160,220], deco: [155,195,220], clouds: [235,245,250] },
];

// ===================== MUSIQUES =====================
// Une piste par monde (ambiance qui colle à la DA de chaque monde), + une pour le Game Over et une pour la Victoire.
// LA VILLE      -> chiptune énergique "plateforme urbaine"
// LE DÉSERT     -> thème d'exploration/aventure (grandes étendues à parcourir)
// LA FORÊT      -> instrumental 8-bit plus posé, adapté au platforming en forêt
// LA BANQUISE   -> thème de combat de boss, pour l'intensité du dernier monde / roi des glaces
const MUSIC = {
  ville:    new Audio('nickpanekaiassets-high-energy-chiptune-for-platform-games-225292.mp3'),
  desert:   new Audio('nickpanekaiassets-exploration-chiptune-rpg-adventure-theme-336428.mp3'),
  foret:    new Audio('nickpanekaiassets-platform-shoes-8-bit-chiptune-instrumental-336417.mp3'),
  banquise: new Audio('retro-bgm-chan-boss-battle-part2-534626.mp3'),
  gameover: new Audio('lightyeartraxx-kl-peach-game-over-ii-135684.mp3'),
  victory:  new Audio('maksymmalko-fanfare-award-awards-music-557068.mp3'),
};
Object.values(MUSIC).forEach(a => { a.loop = true; a.volume = 0.45; a.preload = 'auto'; });

const WORLD_MUSIC_KEYS = ['ville', 'desert', 'foret', 'banquise']; // même ordre que WORLD_THEMES

let currentMusicKey = null;
function playMusic(key){
  if(currentMusicKey === key) return;
  if(currentMusicKey && MUSIC[currentMusicKey]){ MUSIC[currentMusicKey].pause(); MUSIC[currentMusicKey].currentTime = 0; }
  currentMusicKey = key;
  if(key && MUSIC[key]){
    MUSIC[key].currentTime = 0;
    MUSIC[key].play().catch(() => {}); // autoplay bloqué tant qu'il n'y a pas eu d'interaction : sans risque, on retentera à chaque frame
  }
}
// Choisit la bonne musique selon l'état du jeu / le monde courant. Appelé en boucle (sans coût si rien ne change).
function updateMusic(){
  let key = null;
  if(state === STATE_PLAYING || state === STATE_LEVEL_CLEAR){
    key = WORLD_MUSIC_KEYS[Math.min(worldIndex, WORLD_MUSIC_KEYS.length - 1)];
  } else if(state === STATE_GAME_OVER){
    key = 'gameover';
  } else if(state === STATE_VICTORY){
    key = 'victory';
  }
  playMusic(key);
}

// Ennemis "de base" et boss par monde, calqués sur la DA (voyou cagoulé, scorpion, créature de forêt, bonhomme de neige / gros bras, pharaon, monstre-arbre, roi des glaces)
const ENEMY_KINDS = ['thug', 'scorpion', 'critter', 'snow'];
const BOSS_KINDS  = ['thug_boss', 'pharaoh_boss', 'tree_boss', 'ice_boss'];

const LEVEL_NAMES = ["NIVEAU 1", "NIVEAU 2", "NIVEAU 3", "NIVEAU 4", "NIVEAU BOSS"];
const BOSS_NAMES = ["LE CAÏD DE LA RUE", "LE PHARAON MAUDIT", "L'ESPRIT DE LA FORÊT", "LE ROI DES GLACES"];

// ===================== PERSONNAGES DÉBLOCABLES =====================
// Chaque personnage réutilise le même squelette de sprite (drawPlayerSprite) mais avec
// sa propre palette de couleurs + un petit accessoire thématique. Ils se débloquent
// via des quêtes simples basées sur la progression du joueur (stats ci-dessous).
const DEFAULT_PALETTE = { skin:'#c9884f', skinShade:'#a8703f', hoodie:'#14141a', hoodieLight:'#20202a', accent:'#2f6fe0', accentLight:'#5b93f0', hair:'#151018', hairHi:'#241a26', shoeWhite:'#f1f5fa', shoeBlack:'#15151a', silver:'#e9e9ee' };

const CHARACTERS = [
  {
    id: 'zkr', name: 'ZKR', theme: 'Street (original)', accessory: null,
    palette: DEFAULT_PALETTE,
    quest: 'Débloqué dès le départ.',
    isUnlocked: () => true
  },
  {
    id: 'kenji', name: 'KENJI', theme: 'Manga Shonen', accessory: 'headband',
    palette: { skin:'#e8b98a', skinShade:'#c99968', hoodie:'#e6621f', hoodieLight:'#ff8a42', accent:'#1c1c1c', accentLight:'#3a3a3a', hair:'#1c1c1c', hairHi:'#333', shoeWhite:'#f1f5fa', shoeBlack:'#15151a', silver:'#e9e9ee' },
    quest: 'Termine le monde LA VILLE (bats son boss).',
    isUnlocked: () => worldsCompletedCount >= 1
  },
  {
    id: 'sakura', name: 'SAKURA', theme: 'Animé Ninja', accessory: 'mask',
    palette: { skin:'#e3b48f', skinShade:'#c4926c', hoodie:'#2a1f3d', hoodieLight:'#402f5c', accent:'#c23bd8', accentLight:'#e07cf0', hair:'#3a1030', hairHi:'#5a1a4a', shoeWhite:'#e9e9ee', shoeBlack:'#15151a', silver:'#e9e9ee' },
    quest: 'Bats 2 boss au total.',
    isUnlocked: () => bossesDefeated >= 2
  },
  {
    id: 'leo', name: 'LÉO', theme: 'Footballeur', accessory: 'jersey', number: '9',
    palette: { skin:'#c9884f', skinShade:'#a8703f', hoodie:'#1560c4', hoodieLight:'#2f7fe0', accent:'#ffffff', accentLight:'#dfe9ff', hair:'#221510', hairHi:'#3a281f', shoeWhite:'#f1f5fa', shoeBlack:'#15151a', silver:'#e9e9ee' },
    quest: 'Collecte 60 pièces au total.',
    isUnlocked: () => totalCoinsAllTime >= 60
  },
  {
    id: 'legend', name: 'ZKR LÉGENDE', theme: 'Doré / Boss final', accessory: 'crown',
    palette: { skin:'#c9884f', skinShade:'#a8703f', hoodie:'#151018', hoodieLight:'#2a2432', accent:'#ffd23c', accentLight:'#fff0a0', hair:'#151018', hairHi:'#3a3020', shoeWhite:'#fff6d8', shoeBlack:'#3a2f10', silver:'#ffe98a' },
    quest: 'Termine le jeu en entier (bats les 4 mondes).',
    isUnlocked: () => victoriesCount >= 1
  }
];
function getCharacter(id){ return CHARACTERS.find(c => c.id === id) || CHARACTERS[0]; }

function rgb(c){ return `rgb(${c[0]},${c[1]},${c[2]})`; }
function mod(n, m){ return ((n % m) + m) % m; }

function coinArc(cx, cy, count=3, spacing=34){
  const start = cx - (count-1)*spacing/2;
  const coins = [];
  for(let i=0;i<count;i++) coins.push([start+i*spacing, cy]);
  return coins;
}

function buildLevel(opts){
  const segments = opts.segments || [];
  const platforms = opts.platforms || [];
  const coins = opts.coins || [];
  const spikes = opts.spikes || [];
  const enemies = opts.enemies || [];
  // movingPlatforms : tableau de [x, y, w, h, axis('x'|'y'), range, speed, phase]
  const movingPlatforms = (opts.movingPlatforms || []).map(m => new MovingPlatform(m[0], m[1], m[2], m[3], m[4], m[5], m[6], m[7] || 0));
  const groundRects = segments.map(s => ({x:s[0], y:GROUND_Y, w:s[1]-s[0], h:HEIGHT-GROUND_Y+80}));
  let platformRects = platforms.map(p => ({x:p[0], y:p[1], w:p[2], h:p[3]}));
  const spikeRects = spikes.map(s => ({x:s[0], y:s[1], w:s[2], h:s[3]}));
  const startX = (opts.startX !== undefined) ? opts.startX : 60;
  const startY = (opts.startY !== undefined) ? opts.startY : GROUND_Y - 80;
  const goalY = (opts.goalY !== undefined) ? opts.goalY : GROUND_Y;

  const spawnPlatform = {x: startX - 70, y: startY + PLAYER_HEIGHT, w: 280, h: 24};
  platformRects = platformRects.concat([spawnPlatform]).concat(movingPlatforms);

  // Si le niveau contient un boss, on place une barrière énergétique juste avant le drapeau :
  // impossible de terminer le niveau tant que ce boss n'est pas vaincu.
  const hasBoss = enemies.some(e => e.isBoss);
  const bossBarrierX = (hasBoss && opts.goalX !== undefined) ? opts.goalX - 90 : null;

  return {
    groundRects, platformRects,
    solids: groundRects.concat(platformRects),
    movingPlatforms,
    bossBarrierX,
    coins: coins.map(c => ({x:c[0], y:c[1], taken:false})),
    spikes: spikeRects,
    enemyData: enemies,
    goalX: opts.goalX, goalY: goalY,
    width: opts.width, startX, startY
  };
}

function archetypeClassic(worldIndex, diff){
  const length = 2300 + diff*150;
  const gapW = 70 + diff*8;
  const gaps = [520, 1150, 1750, 2200];
  const segments = [];
  let prev = 0;
  for(const g of gaps){ if(g < length){ segments.push([prev, g]); prev = g + gapW; } }
  segments.push([prev, length+250]);

  let coins = [];
  for(const cx of [240, 780, 1350, 1900]) coins = coins.concat(coinArc(cx, GROUND_Y-50));
  const enemies = [
    {x:640, y:GROUND_Y-60, left:600, right:940, speed:1.4+diff*0.2},
    {x:1780, y:GROUND_Y-60, left:1730, right:2060, speed:1.4+diff*0.2},
  ];
  if(diff >= 2.5) enemies.push({x:1150, y:GROUND_Y-60, left:1050, right:1400, speed:1.4+diff*0.2});
  return buildLevel({segments, coins, enemies, goalX: length + 130, width: length+300});
}

function archetypeStairs(worldIndex, diff){
  const platforms = [], coins = [], enemies = [], movingPlatforms = [];
  const stepW = 140, stepH = 20;
  const nSteps = 5 + Math.floor(diff/2);

  let curX = 220, curY = GROUND_Y - 40; 
  for(let i=0;i<nSteps;i++){
    platforms.push([curX, curY, stepW, stepH]);
    coins.push([curX+stepW/2, curY-45]);
    if(i%2===1) enemies.push({x:curX+20, y:curY-60, left:curX, right:curX+stepW-44, speed:1.2+diff*0.15});
    curX += stepW+55; curY -= 45;
  }

  const plateauX = curX, plateauY = curY;
  // Le plateau sommital ondule verticalement à partir d'une certaine difficulté : il faut sauter au bon moment
  if(diff >= 1.5){
    movingPlatforms.push([plateauX, plateauY, 230, stepH, 'y', 40, 0.025 + diff*0.002, 0]);
  } else {
    platforms.push([plateauX, plateauY, 230, stepH]);
  }
  for(const c of coinArc(plateauX+115, plateauY-45, 3)) coins.push(c);

  curX = plateauX+230+55; curY = plateauY + 45;
  for(let i=0; i<nSteps; i++){
    platforms.push([curX, curY, stepW, stepH]);
    if(i%2===0) coins.push([curX+stepW/2, curY-45]);
    curX += stepW+55; curY += 45;
  }

  const groundStart = curX - 40;
  const length = curX + 420;
  const segments = [[0, 300], [groundStart, length]];
  return buildLevel({segments, platforms, movingPlatforms, coins, enemies, goalX: length - 120, width: length+150});
}

function archetypeFloating(worldIndex, diff){
  const length = 2500 + diff*200;
  const spikes = [[0, GROUND_Y, length+200, 40]];
  const platforms = [], enemies = [], movingPlatforms = [];
  let curX = 160;
  let coins = [];
  const heights = [GROUND_Y-90, GROUND_Y-165, GROUND_Y-115, GROUND_Y-205, GROUND_Y-135, GROUND_Y-175, GROUND_Y-100];
  if(diff >= 2) heights.push(GROUND_Y-190);
  if(diff >= 3.2) heights.push(GROUND_Y-225);

  heights.forEach((h, i) => {
    // À partir d'une certaine difficulté, une plateforme sur trois devient mobile (alternance horizontale/verticale)
    if(diff >= 1 && i % 3 === 2){
      const axis = i % 6 === 2 ? 'y' : 'x';
      const range = axis === 'y' ? 50 : 70;
      movingPlatforms.push([curX, h, 150, 20, axis, range, 0.028 + diff*0.003, i]);
    } else {
      platforms.push([curX, h, 150, 20]);
    }
    coins = coins.concat(coinArc(curX+75, h-42, 2));
    if(i%2===0) enemies.push({x:curX+35, y:h-60, left:curX, right:curX+106, speed:1.3+diff*0.2});
    curX += 275 + diff*8;
  });

  platforms.push([curX, GROUND_Y-95, 220, 20]);
  return buildLevel({platforms, movingPlatforms, coins, spikes, enemies, goalX: curX+110, width: curX+520, startX: 200, startY: heights[0]-90, goalY: GROUND_Y-95});
}

function archetypeTraps(worldIndex, diff){
  const nClusters = 5 + Math.round(diff), length = 300 + nClusters*350 + 300;
  const segments = [[0, length]], spikes = [], platforms = [], enemies = [];
  let coins = [];
  let curX = 340;
  for(let i=0;i<nClusters;i++){
    spikes.push([curX, GROUND_Y-22, 90+diff*6, 22]);
    platforms.push([curX-25, GROUND_Y-150, 180+diff*6, 20]);
    coins = coins.concat(coinArc(curX+45, GROUND_Y-190, 2));
    if(i%2===0) enemies.push({x:curX+260, y:GROUND_Y-60, left:curX+210, right:curX+380, speed:1.5+diff*0.25});
    curX += 350;
  }
  return buildLevel({segments, platforms, coins, spikes, enemies, goalX: curX + 150, width: length+200});
}

function archetypeGauntlet(worldIndex, diff){
  // Gouffre à pièges : petites plateformes de sol séparées par des fosses de pics, avec un chemin aérien alternatif
  const nGaps = 6 + Math.round(diff);
  const spikes = [], platforms = [], enemies = [], movingPlatforms = [];
  let coins = [];
  const segments = [];
  let prevEnd = 300;
  segments.push([0, prevEnd]);
  for(let i=0;i<nGaps;i++){
    const gapW = 85 + diff*6;
    spikes.push([prevEnd, GROUND_Y-18, gapW, 18]);
    const landStart = prevEnd + gapW, landLen = 150;
    segments.push([landStart, landStart + landLen]);
    if(i % 2 === 0){
      // Passé un certain seuil de difficulté, la plateforme au-dessus des pics glisse : il faut viser le bon moment
      if(diff >= 2.5){
        movingPlatforms.push([prevEnd + gapW/2 - 45, GROUND_Y-115, 90, 18, 'x', 35, 0.03 + diff*0.002, i]);
      } else {
        platforms.push([prevEnd + gapW/2 - 45, GROUND_Y-115, 90, 18]);
      }
      coins.push([prevEnd + gapW/2, GROUND_Y-145]);
    } else {
      coins.push([landStart + landLen/2, GROUND_Y-55]);
    }
    if(i % 3 === 1) enemies.push({x: landStart+20, y:GROUND_Y-60, left: landStart, right: landStart+landLen-44, speed:1.6+diff*0.25});
    prevEnd = landStart + landLen;
  }
  const length = prevEnd + 260;
  segments.push([prevEnd, length]);
  return buildLevel({segments, platforms, movingPlatforms, coins, spikes, enemies, goalX: length-140, width: length+150});
}

function archetypeZigzag(worldIndex, diff){
  // Plateformes en zigzag au-dessus d'une fosse continue : rythme de saut haut/bas
  const nPlat = 9 + Math.round(diff);
  const platforms = [], enemies = [], movingPlatforms = [];
  let coins = [];
  let curX = 180;
  // amplitude et espacement FIXES : ils correspondent à la portée de saut du joueur.
  // Les faire grandir avec la difficulté rendait certaines plateformes injouables (marge de saut ~nulle) en fin de partie.
  const baseY = GROUND_Y - 140, amp = 56;
  for(let i=0;i<nPlat;i++){
    const y = baseY + (i % 2 === 0 ? -amp : amp) + (i % 4 === 0 ? -18 : 0);
    // Une plateforme sur quatre glisse latéralement à partir d'une certaine difficulté : oblige à ajuster le timing du saut
    if(diff >= 1.5 && i % 4 === 3){
      movingPlatforms.push([curX, y, 130, 20, 'x', 60, 0.03 + diff*0.003, i]);
    } else {
      platforms.push([curX, y, 130, 20]);
    }
    coins = coins.concat(coinArc(curX+65, y-40, 2, 26));
    if(i % 3 === 2) enemies.push({x:curX+30, y:y-60, left:curX, right:curX+96, speed:1.3+diff*0.2});
    curX += 210;
  }
  platforms.push([curX, GROUND_Y-100, 220, 20]);
  const length = curX + 500;
  const spikes = [[0, GROUND_Y, length, 40]];
  return buildLevel({platforms, movingPlatforms, coins, spikes, enemies, goalX: curX+110, width: length, startX:200, startY: baseY-90, goalY: GROUND_Y-100});
}

function archetypeCorridor(worldIndex, diff){
  // Couloir au sol avec des plafonds bas : il faut s'accroupir/glisser pour passer dessous
  const nTunnels = 4 + Math.round(diff);
  const platforms = [], enemies = [];
  let coins = [];
  let curX = 500;
  for(let i=0;i<nTunnels;i++){
    const tunnelLen = 220;
    platforms.push([curX, GROUND_Y-70, tunnelLen, 22]); // plafond bas : oblige à s'accroupir pour passer
    coins = coins.concat(coinArc(curX+tunnelLen/2, GROUND_Y-42, 2, 40));
    curX += tunnelLen + 260;
    if(i % 2 === 0) enemies.push({x:curX-140, y:GROUND_Y-60, left:curX-240, right:curX-40, speed:1.4+diff*0.2});
  }
  const length = curX + 320;
  const segments = [[0, length]];
  return buildLevel({segments, platforms, coins, enemies, goalX: length-150, width: length+150});
}

function archetypeIslandRun(worldIndex, diff){
  // Îlots isolés de tailles et hauteurs irrégulières au-dessus du vide : place à la précision
  const n = 8 + Math.round(diff);
  const platforms = [], enemies = [], movingPlatforms = [];
  let coins = [];
  let curX = 200;
  for(let i=0;i<n;i++){
    const w = Math.max(40, 70 - diff*3 + ((i*37 + worldIndex*13) % 3) * 30);
    const yOff = 90 + ((i*53 + worldIndex*7) % 5) * 28;
    const y = GROUND_Y - yOff;
    // Un îlot sur trois dérive (horizontalement ou verticalement) à partir d'une certaine difficulté
    if(diff >= 1.2 && i % 3 === 1){
      const axis = i % 6 === 1 ? 'y' : 'x';
      movingPlatforms.push([curX, y, w, 18, axis, axis==='y'?45:65, 0.026 + diff*0.0025, i]);
    } else {
      platforms.push([curX, y, w, 18]);
    }
    if(i % 2 === 0) coins.push([curX+w/2, y-35]);
    else coins = coins.concat(coinArc(curX+w/2, y-35, 2, 22));
    if(i % 4 === 3) enemies.push({x:curX+10, y:y-58, left:curX, right:curX+Math.max(w-44,20), speed:1.3+diff*0.2});
    curX += w + 130 + diff*6;
  }
  platforms.push([curX, GROUND_Y-100, 220, 20]);
  const length = curX + 520;
  const spikes = [[0, GROUND_Y, length, 40]];
  return buildLevel({platforms, movingPlatforms, coins, spikes, enemies, goalX: curX+110, width: length, startX:200, startY: GROUND_Y-190, goalY: GROUND_Y-100});
}

function archetypeFinal(worldIndex, diff){
  const length = 3100 + diff*250, segments = [[0, length+400]], platforms = [], spikes = [], enemies = [];
  let coins = coinArc(230, GROUND_Y-50);
  let fx = 1120;
  [90,150,110,180].forEach((dy, i) => {
    platforms.push([fx, GROUND_Y-dy, 130, 20]);
    coins = coins.concat(coinArc(fx+65, GROUND_Y-dy-40, 2));
    fx += 250;
  });
  // Arène du boss : une plateforme dégagée avant l'objectif, avec le boss du monde
  const arenaX = length - 520;
  const bossX = arenaX + 260;
  enemies.push({
    x: bossX, y: GROUND_Y-100, left: arenaX+60, right: arenaX+460,
    speed: 1.6 + diff*0.3, w: 80, h: 100, hp: 4 + Math.round(diff*1.5), isBoss: true
  });
  return buildLevel({segments, platforms, coins, spikes, enemies, goalX: length+130, width: length+400});
}

// Bassin des styles de niveaux "normaux" (le niveau boss est toujours généré à part par archetypeFinal)
const NORMAL_ARCHETYPES = [archetypeClassic, archetypeZigzag, archetypeFloating, archetypeCorridor, archetypeStairs, archetypeGauntlet, archetypeIslandRun, archetypeTraps];

function generateLevel(wIdx, lIdx){
  // Facteur de progression CONTINU : augmente à chaque monde ET à chaque niveau à l'intérieur d'un même monde
  // (avant, seul le changement de monde augmentait la difficulté ; les 4 niveaux d'un monde étaient identiques en taille/difficulté).
  // Ex: monde 0 -> niveaux 0,1,2,3,boss = diff 0, 0.25, 0.5, 0.75, 1 ; monde 1 -> 1, 1.25, 1.5, 1.75, 2 ; etc.
  const diff = wIdx + Math.min(lIdx, LEVELS_PER_WORLD - 1) / (LEVELS_PER_WORLD - 1);
  if(lIdx >= 4) return archetypeFinal(wIdx, diff); // NIVEAU BOSS : toujours un vrai combat de boss
  // On fait tourner le bassin de styles avec un décalage différent à chaque monde (pas premier avec la taille du bassin)
  // pour qu'aucun monde ne rejoue la même séquence de styles qu'un autre.
  const slot = (wIdx * 3 + lIdx) % NORMAL_ARCHETYPES.length;
  return NORMAL_ARCHETYPES[slot](wIdx, diff);
}

function rectsOverlap(a, b){ return !(a.x+a.w <= b.x || a.x >= b.x+b.w || a.y+a.h <= b.y || a.y >= b.y+b.h); }

// Projectile de l'attaque à distance : tiré par le joueur, se déplace en ligne droite,
// disparaît en touchant un ennemi, un mur, ou au bout de sa durée de vie.
class Projectile {
  constructor(x, y, dir, color){
    this.x = x; this.y = y; this.w = 16; this.h = 8;
    this.dir = dir; this.vx = PROJECTILE_SPEED * dir;
    this.life = PROJECTILE_LIFE; this.dead = false;
    this.color = color || '#5b93f0';
  }
  get rect(){ return {x:this.x, y:this.y, w:this.w, h:this.h}; }
  update(solids){
    this.x += this.vx;
    this.life--;
    if(this.life <= 0) this.dead = true;
    for(const s of solids){ if(rectsOverlap(this.rect, s)){ this.dead = true; break; } }
  }
}

class Enemy {
  constructor(x, y, left, right, speed, opts={}){
    this.x=x; this.y=y; this.left=left; this.right=right; this.speed=speed; this.dir=1; this.alive=true;
    this.w = opts.w || 44; this.h = opts.h || 58;
    this.isBoss = !!opts.isBoss; this.maxHp = opts.hp || 1; this.hp = this.maxHp;
    this.kind = opts.kind || 'thug';
    this.hitFlash = 0;
  }
  get rect(){ return {x:this.x, y:this.y, w:this.w, h:this.h}; }
  hit(){
    this.hp--; this.hitFlash = 10;
    if(this.hp <= 0) this.alive = false;
  }
  update(){
    if(!this.alive) return;
    if(this.hitFlash > 0) this.hitFlash--;
    this.x += this.speed*this.dir;
    if(this.x < this.left){ this.x = this.left; this.dir = 1; }
    else if(this.x+this.w > this.right){ this.x = this.right-this.w; this.dir = -1; }
  }
}

// Plateforme mobile : oscille en va-et-vient sur l'axe X (gauche/droite) ou Y (haut/bas)
// autour de sa position de base, selon une sinusoïde. Le joueur qui se tient dessus
// est "transporté" horizontalement (voir Player.update / ridingPlatform).
class MovingPlatform {
  constructor(x, y, w, h, axis, range, speed, phase=0){
    this.baseX = x; this.baseY = y; this.w = w; this.h = h;
    this.axis = axis; // 'x' = va-et-vient horizontal, 'y' = va-et-vient vertical
    this.range = range; this.speed = speed; this.phase = phase;
    this.x = x; this.y = y; this.dx = 0; this.dy = 0;
  }
  update(tick){
    const prevX = this.x, prevY = this.y;
    const offset = Math.sin(tick*this.speed + this.phase) * this.range;
    if(this.axis === 'x') this.x = this.baseX + offset;
    else this.y = this.baseY + offset;
    this.dx = this.x - prevX; this.dy = this.y - prevY;
  }
}

class Player {
  constructor(){ this.x=0; this.y=0; this.vx=0; this.vy=0; this.w=PLAYER_WIDTH; this.h=PLAYER_HEIGHT; this.onGround=false; this.invincibleTimer=0; this.facing=1; this.slideTimer=0; this.ridingPlatform=null; this.shootCooldown=0; }
  get rect(){ return {x:this.x, y:this.y, w:this.w, h:this.h}; }
  reset(x, y){ this.x=x; this.y=y; this.vx=0; this.vy=0; this.h=PLAYER_HEIGHT; this.onGround=false; this.invincibleTimer=60; this.slideTimer=0; this.shootCooldown=0; }
  update(keys, solids){
    const left = !!keys['ArrowLeft'] || !!keys['q'] || !!keys['Q'];
    const right = !!keys['ArrowRight'] || !!keys['d'] || !!keys['D'];
    const down = !!keys['ArrowDown'] || !!keys['s'] || !!keys['S'];
    const jump = !!keys[' '];

    if(left) this.facing = -1; else if(right) this.facing = 1;

    // Trigger a slide when crouching while moving on the ground (not already sliding/crouched)
    if(down && this.onGround && this.slideTimer <= 0 && this.h === PLAYER_HEIGHT && Math.abs(this.vx) > 0.1){
      this.slideTimer = 22;
    }

    let isCrouching = (down && this.onGround) || this.slideTimer > 0;
    let targetH = isCrouching ? PLAYER_CROUCH_HEIGHT : PLAYER_HEIGHT;
    if(targetH !== this.h) { this.y += (this.h - targetH); this.h = targetH; }

    if(this.slideTimer > 0){
      this.slideTimer--;
      this.vx = this.facing * MOVE_SPEED * 1.7;
    } else if(isCrouching){
      this.vx = 0;
    } else if(left){
      this.vx = -MOVE_SPEED;
    } else if(right){
      this.vx = MOVE_SPEED;
    } else {
      this.vx = 0;
    }

    if(jump && this.onGround && !isCrouching){ this.vy = JUMP_VELOCITY; this.onGround = false; }

    // Si on était posé sur une plateforme mobile la frame précédente, on est transporté avec elle,
    // sur X ET sur Y (avant seul l'axe X était géré : un joueur posé sur une plateforme qui monte/descend
    // se faisait distancer par elle, ce qui donnait l'impression de "traverser" ou de tomber à travers).
    if(this.ridingPlatform){
      this.x += this.ridingPlatform.dx;
      this.y += this.ridingPlatform.dy;
    }

    this.x += this.vx;
    if(this.x < 0) this.x = 0;
    for(const s of solids){ if(rectsOverlap(this.rect, s)){ if(this.vx > 0) this.x = s.x - this.w; else if(this.vx < 0) this.x = s.x + s.w; } }
    this.vy += GRAVITY; if(this.vy > MAX_FALL) this.vy = MAX_FALL;
    this.y += this.vy; this.onGround = false;
    let landedOn = null;
    // On teste d'abord la plateforme qu'on chevauchait déjà (si elle existe toujours) pour éviter
    // qu'un mouvement rapide de plateforme + gravité ne fasse "sauter" la détection d'une frame à l'autre.
    const orderedSolids = this.ridingPlatform ? [this.ridingPlatform, ...solids.filter(s => s !== this.ridingPlatform)] : solids;
    for(const s of orderedSolids){ if(rectsOverlap(this.rect, s)){ if(this.vy > 0){ this.y = s.y - this.h; this.vy = 0; this.onGround = true; landedOn = s; } else if(this.vy < 0){ this.y = s.y + s.h; this.vy = 0; } } }
    this.ridingPlatform = (landedOn instanceof MovingPlatform) ? landedOn : null;
    if(this.invincibleTimer > 0) this.invincibleTimer--;
    if(this.shootCooldown > 0) this.shootCooldown--;
  }
}

// Palette perso : peau ambrée, hoodie/jogging noir à bande bleue,
// casque rouge/bleu, chaîne, sneakers bleu/blanc, afro noire.

function roundRectPath(x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y, x+w, y+h, r);
  ctx.arcTo(x+w, y+h, x, y+h, r);
  ctx.arcTo(x, y+h, x, y, r);
  ctx.arcTo(x, y, x+w, y, r);
  ctx.closePath();
}

function drawPlayerSprite(x, y, w, h, dir, vx, onGround, crouching, tick, charDef){
  ctx.save();
  ctx.translate(x, y);
  if(dir < 0){ ctx.translate(w, 0); ctx.scale(-1, 1); }

  // Palette du personnage sélectionné (ZKR par défaut si aucun n'est précisé)
  const pal = (charDef && charDef.palette) ? charDef.palette : DEFAULT_PALETTE;
  const skin = pal.skin;
  const skinShade = pal.skinShade;
  const hoodie = pal.hoodie;
  const hoodieLight = pal.hoodieLight;
  const accent = pal.accent;
  const accentLight = pal.accentLight;
  const hair = pal.hair;
  const hairHi = pal.hairHi;
  const shoeWhite = pal.shoeWhite;
  const shoeBlack = pal.shoeBlack;
  const silver = pal.silver;

  const headR = w*0.36;
  const headCX = w*0.5, headCY = headR + 2;
  const torsoTop = headCY + headR*0.72;
  const torsoBot = h*0.72;
  const legTop = torsoBot, legBot = h;
  const torsoH = torsoBot - torsoTop;

  const speedRatio = Math.min(Math.abs(vx)/MOVE_SPEED, 1);
  const swing = onGround && !crouching ? Math.sin(tick*0.4)*8*speedRatio : (onGround ? 0 : 4);
  const legW = w*0.29, legGap = 2;

  // ---- jambes (jogging noir + bande bleue latérale) ----
  ctx.fillStyle = hoodie;
  ctx.fillRect(w*0.5-legW-legGap - swing*0.3, legTop, legW, legBot-legTop-7);
  ctx.fillRect(w*0.5+legGap + swing*0.3, legTop, legW, legBot-legTop-7);
  ctx.fillStyle = accent;
  ctx.fillRect(w*0.5-legW-legGap - swing*0.3, legTop, 4.5, legBot-legTop-7);
  ctx.fillRect(w*0.5+legGap+legW-4.5 + swing*0.3, legTop, 4.5, legBot-legTop-7);

  // ---- sneakers bicolores (style Jordan 1 : cuir blanc, empiècement bleu, bout/semelle noirs) ----
  const shoeY = legBot-9, shoeH = 9;
  [[w*0.5-legW-legGap-3 - swing*0.3, -1], [w*0.5+legGap-3 + swing*0.3, 1]].forEach(([sx, side])=>{
    ctx.fillStyle = shoeWhite;
    ctx.fillRect(sx, shoeY, legW+6, shoeH);
    ctx.fillStyle = accent;
    ctx.fillRect(sx+ (side<0?legW-6:2), shoeY+1, 10, shoeH-3);
    ctx.fillStyle = shoeBlack;
    ctx.fillRect(sx, shoeY+shoeH-3, legW+6, 3); // semelle
    ctx.fillRect(sx + (side<0? -1 : legW), shoeY-1, 6, 5); // bout renforcé
  });

  // ---- bras (manches hoodie + poignets) ----
  const armSwing = onGround && !crouching ? Math.sin(tick*0.4+Math.PI)*6*speedRatio : 0;
  const armLen = torsoH*0.8;
  ctx.fillStyle = hoodie;
  ctx.fillRect(w*0.5-w*0.46-2, torsoTop+2+armSwing*0.4, 9.5, armLen);
  ctx.fillRect(w*0.5+w*0.46-7.5, torsoTop+2-armSwing*0.4, 9.5, armLen);
  ctx.fillStyle = accent;
  ctx.fillRect(w*0.5-w*0.46-2, torsoTop+2+armSwing*0.4+armLen-9, 9.5, 3); // poignet côtelé
  ctx.fillRect(w*0.5+w*0.46-7.5, torsoTop+2-armSwing*0.4+armLen-9, 9.5, 3);
  ctx.fillStyle = skin;
  ctx.beginPath(); ctx.arc(w*0.5-w*0.46+2.5, torsoTop+2+armSwing*0.4+armLen, 5.5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(w*0.5+w*0.46-2.5, torsoTop+2-armSwing*0.4+armLen, 5.5, 0, Math.PI*2); ctx.fill();

  // ---- torse (hoodie zippé + bande bleue + col) ----
  const torsoGrad = ctx.createLinearGradient(w*0.5-w*0.42, torsoTop, w*0.5+w*0.42, torsoTop);
  torsoGrad.addColorStop(0, hoodie); torsoGrad.addColorStop(0.5, hoodieLight); torsoGrad.addColorStop(1, hoodie);
  ctx.fillStyle = torsoGrad;
  roundRectPath(w*0.5-w*0.42, torsoTop, w*0.84, torsoH, 6);
  ctx.fill();
  ctx.fillStyle = accent;
  ctx.fillRect(w*0.5+w*0.29, torsoTop, 6.5, torsoH); // bande bleue
  ctx.strokeStyle = '#0b0b0f'; ctx.lineWidth = 1.4; // zip central
  ctx.beginPath(); ctx.moveTo(w*0.5-1, torsoTop+4); ctx.lineTo(w*0.5-1, torsoBot-2); ctx.stroke();
  ctx.fillStyle = hoodieLight; // col capuche
  ctx.beginPath(); ctx.moveTo(w*0.5-w*0.24, torsoTop); ctx.lineTo(w*0.5, torsoTop+9); ctx.lineTo(w*0.5+w*0.24, torsoTop); ctx.closePath(); ctx.fill();

  // ---- chaîne + plaque "ZKR" ----
  ctx.strokeStyle = silver; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(w*0.5-9, torsoTop+3); ctx.quadraticCurveTo(w*0.5, torsoTop+17, w*0.5+9, torsoTop+3); ctx.stroke();
  ctx.fillStyle = silver;
  ctx.fillRect(w*0.5-6, torsoTop+15, 12, 7);
  ctx.fillStyle = accent;
  ctx.fillRect(w*0.5-4.5, torsoTop+16.5, 9, 2.2);

  // ---- tête ----
  const skinGrad = ctx.createRadialGradient(headCX-headR*0.3, headCY-headR*0.3, headR*0.2, headCX, headCY, headR*1.1);
  skinGrad.addColorStop(0, skin); skinGrad.addColorStop(1, skinShade);
  ctx.fillStyle = skinGrad;
  ctx.beginPath(); ctx.arc(headCX, headCY, headR, 0, Math.PI*2); ctx.fill();

  // oreilles
  ctx.fillStyle = skin;
  ctx.beginPath(); ctx.arc(headCX-headR*0.98, headCY+headR*0.15, headR*0.22, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(headCX+headR*0.98, headCY+headR*0.15, headR*0.22, 0, Math.PI*2); ctx.fill();

  // afro volumineuse (plusieurs lobes pour le côté touffu de la référence)
  ctx.fillStyle = hair;
  ctx.beginPath(); ctx.arc(headCX, headCY-headR*0.62, headR*0.95, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(headCX-headR*0.88, headCY-headR*0.22, headR*0.62, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(headCX+headR*0.88, headCY-headR*0.22, headR*0.62, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(headCX-headR*0.35, headCY-headR*1.02, headR*0.55, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(headCX+headR*0.35, headCY-headR*1.02, headR*0.55, 0, Math.PI*2); ctx.fill();
  // reflets bouclés (petits arcs plus clairs pour la texture)
  ctx.fillStyle = hairHi;
  for(let i=0;i<5;i++){
    const ang = -Math.PI*0.85 + i*0.42;
    const rx = headCX + Math.cos(ang)*headR*0.72, ry = headCY-headR*0.5 + Math.sin(ang)*headR*0.62;
    ctx.beginPath(); ctx.arc(rx, ry, headR*0.16, 0, Math.PI*2); ctx.fill();
  }

  // casque audio (bandeau + grosses oreillettes rouge gauche / bleue droite + micro)
  ctx.strokeStyle = '#0c0c10'; ctx.lineWidth = 4.5;
  ctx.beginPath(); ctx.arc(headCX, headCY-4, headR*1.12, Math.PI*1.12, Math.PI*1.88); ctx.stroke();
  // oreillette gauche (rouge)
  ctx.fillStyle = '#8f1717';
  ctx.beginPath(); ctx.arc(headCX-headR*1.0, headCY+headR*0.12, headR*0.46, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#e13030';
  ctx.beginPath(); ctx.arc(headCX-headR*1.0, headCY+headR*0.12, headR*0.34, 0, Math.PI*2); ctx.fill();
  // oreillette droite (bleue) + micro
  ctx.fillStyle = '#1f4fa8';
  ctx.beginPath(); ctx.arc(headCX+headR*1.0, headCY+headR*0.12, headR*0.46, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = accentLight;
  ctx.beginPath(); ctx.arc(headCX+headR*1.0, headCY+headR*0.12, headR*0.34, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#111'; ctx.lineWidth = 2.4;
  ctx.beginPath(); ctx.moveTo(headCX+headR*0.78, headCY+headR*0.42); ctx.quadraticCurveTo(headCX+headR*0.55, headCY+headR*0.78, headCX+headR*0.22, headCY+headR*0.9); ctx.stroke();
  ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(headCX+headR*0.22, headCY+headR*0.9, 2.4, 0, Math.PI*2); ctx.fill();

  // visage concentré (sourcils froncés façon référence)
  ctx.strokeStyle = '#1a1208'; ctx.lineWidth = 2.4; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(headCX+headR*0.04, headCY-headR*0.28); ctx.lineTo(headCX+headR*0.32, headCY-headR*0.4); ctx.stroke();
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(headCX+headR*0.06, headCY-2, 5, 5.5);
  ctx.fillRect(headCX+headR*0.5, headCY-2, 5, 5.5);
  ctx.strokeStyle = '#7a4a28'; ctx.lineWidth = 1.6;
  ctx.beginPath(); ctx.moveTo(headCX+headR*0.18, headCY+headR*0.45); ctx.lineTo(headCX+headR*0.5, headCY+headR*0.4); ctx.stroke();

  // traînée de glisse (petit effet de vitesse quand on slide accroupi en mouvement)
  if(crouching && Math.abs(vx) > MOVE_SPEED){
    ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 2;
    for(let i=0;i<3;i++){ ctx.beginPath(); ctx.moveTo(-4-i*6, legBot-6); ctx.lineTo(-14-i*6, legBot-6); ctx.stroke(); }
  }

  // ---- accessoire thématique du personnage débloqué (par-dessus le casque de base) ----
  const accessory = charDef && charDef.accessory;
  if(accessory === 'headband'){
    ctx.fillStyle = '#d81c1c';
    ctx.fillRect(headCX-headR*0.95, headCY-headR*0.6, headR*1.9, headR*0.32);
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(headCX, headCY-headR*0.44, headR*0.14, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#d81c1c';
    ctx.fillRect(headCX+headR*0.85, headCY-headR*0.55, headR*0.5, headR*0.16);
    ctx.fillRect(headCX+headR*0.85, headCY-headR*0.3, headR*0.5, headR*0.16);
  } else if(accessory === 'mask'){
    ctx.fillStyle = pal.accent;
    ctx.fillRect(headCX-headR*0.85, headCY-headR*0.05, headR*1.7, headR*0.62);
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fillRect(headCX-headR*0.85, headCY-headR*0.05, headR*1.7, headR*0.14);
  } else if(accessory === 'jersey'){
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${Math.round(headR*1.05)}px Arial`;
    ctx.textAlign = 'center';
    ctx.fillText(charDef.number || '9', w*0.5, torsoTop + torsoH*0.62);
    ctx.textAlign = 'left';
  } else if(accessory === 'crown'){
    ctx.fillStyle = '#ffd23c';
    ctx.beginPath();
    ctx.moveTo(headCX-headR*0.85, headCY-headR*0.95);
    ctx.lineTo(headCX-headR*0.42, headCY-headR*1.45);
    ctx.lineTo(headCX, headCY-headR*0.98);
    ctx.lineTo(headCX+headR*0.42, headCY-headR*1.45);
    ctx.lineTo(headCX+headR*0.85, headCY-headR*0.95);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#fff6c8';
    ctx.beginPath(); ctx.arc(headCX, headCY-headR*1.4, headR*0.1, 0, Math.PI*2); ctx.fill();
  }

  ctx.restore();
}

function drawEnemySprite(kind, x, y, w, h, tick, dir){
  ctx.save(); ctx.translate(x, y);
  if(dir < 0){ ctx.translate(w, 0); ctx.scale(-1, 1); }

  if(kind === 'thug'){
    // Voyou cagoulé façon rooftop de la référence : hoodie noir, cagoule ronde, fente des yeux rouge, chaîne dorée
    ctx.fillStyle = '#0f0f13';
    roundRectPath(w*0.12, h*0.4, w*0.76, h*0.6, 8); ctx.fill();
    ctx.fillStyle = '#1a1a20';
    ctx.beginPath(); ctx.arc(w*0.5, h*0.32, w*0.42, Math.PI, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#0f0f13';
    ctx.beginPath(); ctx.arc(w*0.5, h*0.36, w*0.4, 0, Math.PI*2); ctx.fill(); // cagoule
    ctx.fillStyle = '#d92b2b';
    ctx.fillRect(w*0.24,h*0.33,w*0.2,5.5);
    ctx.fillRect(w*0.56,h*0.33,w*0.2,5.5);
    ctx.strokeStyle = '#d4af37'; ctx.lineWidth = 2.4;
    ctx.beginPath(); ctx.moveTo(w*0.32,h*0.55); ctx.quadraticCurveTo(w*0.5,h*0.64,w*0.68,h*0.55); ctx.stroke();
  } else if(kind === 'scorpion'){
    const legWig = Math.sin(tick*0.5)*3;
    const shellGrad = ctx.createLinearGradient(0,h*0.35,0,h);
    shellGrad.addColorStop(0,'#c97a28'); shellGrad.addColorStop(1,'#8a4a15');
    ctx.fillStyle = shellGrad;
    ctx.beginPath(); ctx.ellipse(w*0.48,h*0.65,w*0.5,h*0.32,0,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#7a3f10'; ctx.lineWidth = 1.6;
    for(let i=0;i<3;i++){ ctx.beginPath(); ctx.arc(w*0.48,h*0.65,w*0.42-i*7,0.15*Math.PI,0.85*Math.PI); ctx.stroke(); }
    ctx.strokeStyle = '#b5651d'; ctx.lineWidth = 8;
    ctx.beginPath(); ctx.moveTo(w*0.15,h*0.55); ctx.quadraticCurveTo(-w*0.2,h*0.15+legWig,w*0.05,-h*0.05); ctx.stroke();
    ctx.fillStyle = '#7a3f10';
    ctx.beginPath(); ctx.arc(w*0.05,-h*0.05,7,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#8a4a15';
    ctx.fillRect(w*0.85,h*0.48,w*0.22,7);
    ctx.fillRect(w*0.85,h*0.68,w*0.22,7);
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(w*0.18,h*0.55,4,4); ctx.fillRect(w*0.3,h*0.5,4,4);
  } else if(kind === 'critter'){
    const bob = Math.sin(tick*0.3)*2;
    const critGrad = ctx.createRadialGradient(w*0.4,h*0.4+bob,4,w*0.5,h*0.55+bob,w*0.5);
    critGrad.addColorStop(0,'#63cf6e'); critGrad.addColorStop(1,'#2f8a3a');
    ctx.fillStyle = critGrad;
    ctx.beginPath(); ctx.arc(w*0.5,h*0.55+bob,w*0.48,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#1e6b28';
    ctx.beginPath(); ctx.ellipse(w*0.5,h*0.62+bob,w*0.28,h*0.14,0,0,Math.PI); ctx.fill();
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(w*0.32,h*0.45+bob,6,6); ctx.fillRect(w*0.6,h*0.45+bob,6,6);
    ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(w*0.5,h*0.6+bob,8,0,Math.PI); ctx.stroke();
    ctx.fillStyle = '#3fae4a';
    ctx.beginPath(); ctx.arc(w*0.5,h*0.08+bob,5,0,Math.PI*2); ctx.fill();
  } else if(kind === 'snow'){
    ctx.fillStyle = 'rgba(180,210,230,0.35)';
    ctx.beginPath(); ctx.ellipse(w*0.5,h*0.98,w*0.5,6,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#f2f7fb';
    ctx.beginPath(); ctx.arc(w*0.5,h*0.72,w*0.42,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(w*0.5,h*0.32,w*0.32,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#c3d8e8'; ctx.lineWidth = 1.4;
    ctx.beginPath(); ctx.arc(w*0.5,h*0.72,w*0.42,0.15*Math.PI,0.85*Math.PI); ctx.stroke();
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(w*0.4,h*0.28,4,4); ctx.fillRect(w*0.56,h*0.28,4,4);
    ctx.fillRect(w*0.38,h*0.62,4,4); ctx.fillRect(w*0.5,h*0.65,4,4); ctx.fillRect(w*0.6,h*0.62,4,4);
    ctx.fillStyle = '#e07b1a';
    ctx.beginPath(); ctx.moveTo(w*0.5,h*0.36); ctx.lineTo(w*0.72,h*0.4); ctx.lineTo(w*0.5,h*0.42); ctx.fill();
  }
  ctx.restore();
}

function drawBossSprite(kind, x, y, w, h, tick, dir){
  const bob = Math.sin(tick*0.09) * 3; // respiration lente : le boss semble plus imposant et vivant
  const pulse = 0.55 + 0.45*Math.sin(tick*0.12);

  ctx.save();
  // Ombre au sol, ancrée (ne suit pas le bob vertical)
  ctx.translate(x, y);
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.beginPath(); ctx.ellipse(w*0.5, h+8, w*0.52, 9, 0, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  ctx.save(); ctx.translate(x, y + bob);
  if(dir < 0){ ctx.translate(w, 0); ctx.scale(-1, 1); }

  if(kind === 'thug_boss'){
    // Aura sombre pulsante autour du caïd
    const auraG = ctx.createRadialGradient(w*0.5,h*0.45,w*0.08,w*0.5,h*0.45,w*0.85);
    auraG.addColorStop(0, `rgba(70,130,255,${0.26*pulse})`); auraG.addColorStop(1, 'rgba(70,130,255,0)');
    ctx.fillStyle = auraG; ctx.beginPath(); ctx.arc(w*0.5,h*0.45,w*0.85,0,Math.PI*2); ctx.fill();

    // Long manteau qui ondule
    const capeG = ctx.createLinearGradient(0,h*0.3,0,h*1.02);
    capeG.addColorStop(0,'#1c1c26'); capeG.addColorStop(1,'#050507');
    ctx.fillStyle = capeG;
    ctx.beginPath();
    ctx.moveTo(w*0.14,h*0.36);
    ctx.quadraticCurveTo(w*0.0+Math.sin(tick*0.15)*4, h*0.75, w*0.1, h*1.0);
    ctx.lineTo(w*0.9, h*1.0);
    ctx.quadraticCurveTo(w*1.0-Math.sin(tick*0.15)*4, h*0.75, w*0.86,h*0.36);
    ctx.closePath(); ctx.fill();

    // Torse : hoodie premium noir/bleu avec dégradé
    const tGrad = ctx.createLinearGradient(w*0.16,h*0.3,w*0.84,h*0.3);
    tGrad.addColorStop(0,'#0a0a0e'); tGrad.addColorStop(0.5,'#2c2c38'); tGrad.addColorStop(1,'#0a0a0e');
    ctx.fillStyle = tGrad;
    roundRectPath(w*0.16,h*0.3,w*0.68,h*0.56,10); ctx.fill();
    ctx.fillStyle = '#2f6fe0';
    ctx.fillRect(w*0.16,h*0.3,5,h*0.56); ctx.fillRect(w*0.79,h*0.3,5,h*0.56);

    // Grosse chaîne en or
    ctx.strokeStyle = '#f0c94a'; ctx.lineWidth = 3.5;
    ctx.beginPath(); ctx.moveTo(w*0.32,h*0.36); ctx.quadraticCurveTo(w*0.5,h*0.52,w*0.68,h*0.36); ctx.stroke();
    ctx.fillStyle = '#f0c94a'; ctx.beginPath(); ctx.arc(w*0.5,h*0.5,5,0,Math.PI*2); ctx.fill();

    // Bras massifs croisés
    ctx.fillStyle = '#14141a';
    ctx.beginPath(); ctx.ellipse(w*0.26,h*0.58,w*0.15,h*0.1,0.4,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(w*0.74,h*0.58,w*0.15,h*0.1,-0.4,0,Math.PI*2); ctx.fill();

    // Tête, capuche dans l'ombre
    ctx.fillStyle = '#c9884f';
    ctx.beginPath(); ctx.arc(w*0.5,h*0.16,w*0.25,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(8,8,12,0.55)';
    ctx.beginPath(); ctx.arc(w*0.5,h*0.13,w*0.27,Math.PI,0); ctx.fill();

    // Yeux rouges luminescents (menaçant)
    const eyeGlow = 0.6+0.4*Math.sin(tick*0.3);
    ctx.fillStyle = `rgba(255,60,60,${eyeGlow})`;
    ctx.beginPath(); ctx.arc(w*0.41,h*0.16,2.6,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(w*0.59,h*0.16,2.6,0,Math.PI*2); ctx.fill();

    // Bandeau doré
    ctx.fillStyle = '#f0c94a'; ctx.fillRect(w*0.27,h*0.085,0.46*w,4);

  } else if(kind === 'pharaoh_boss'){
    const auraG = ctx.createRadialGradient(w*0.5,h*0.4,w*0.08,w*0.5,h*0.4,w*0.9);
    auraG.addColorStop(0, `rgba(255,205,90,${0.28*pulse})`); auraG.addColorStop(1, 'rgba(255,205,90,0)');
    ctx.fillStyle = auraG; ctx.beginPath(); ctx.arc(w*0.5,h*0.4,w*0.9,0,Math.PI*2); ctx.fill();

    // Cape dorée translucide flottante
    ctx.fillStyle = 'rgba(212,175,55,0.5)';
    ctx.beginPath();
    ctx.moveTo(w*0.18,h*0.4); ctx.quadraticCurveTo(w*0.0, h*0.8+Math.sin(tick*0.15)*5, w*0.14, h*1.02);
    ctx.lineTo(w*0.86,h*1.02);
    ctx.quadraticCurveTo(w*1.0, h*0.8-Math.sin(tick*0.15)*5, w*0.82,h*0.4);
    ctx.closePath(); ctx.fill();

    // Armure bleu royal, ombrée
    const bGrad = ctx.createLinearGradient(w*0.2,h*0.34,w*0.8,h*0.34);
    bGrad.addColorStop(0,'#12225c'); bGrad.addColorStop(0.5,'#2b4bb0'); bGrad.addColorStop(1,'#12225c');
    ctx.fillStyle = bGrad;
    roundRectPath(w*0.2,h*0.34,w*0.6,h*0.56,8); ctx.fill();
    ctx.strokeStyle = '#d4af37'; ctx.lineWidth = 2.4;
    ctx.strokeRect(w*0.2,h*0.34,w*0.6,h*0.56);

    // Pectoral décoré en losange doré
    ctx.fillStyle = '#d4af37';
    ctx.beginPath(); ctx.moveTo(w*0.5,h*0.4); ctx.lineTo(w*0.62,h*0.5); ctx.lineTo(w*0.5,h*0.58); ctx.lineTo(w*0.38,h*0.5); ctx.closePath(); ctx.fill();

    // Némès rayé or/bleu
    ctx.fillStyle = '#d4af37';
    ctx.beginPath(); ctx.moveTo(w*0.12,h*0.34); ctx.lineTo(w*0.5,h*0.02); ctx.lineTo(w*0.88,h*0.34); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#1c3f8f';
    for(let i=0;i<4;i++){ ctx.fillRect(w*0.22+i*w*0.14, h*0.1+i*0.5, w*0.07, h*0.24-i*2); }

    // Visage
    ctx.fillStyle = '#c9884f';
    ctx.beginPath(); ctx.arc(w*0.5,h*0.26,w*0.18,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#1a1a1a'; ctx.fillRect(w*0.43,h*0.23,4.5,4.5); ctx.fillRect(w*0.55,h*0.23,4.5,4.5);

    // Uraeus doré lumineux au front
    const glow2 = 0.5+0.5*Math.sin(tick*0.25);
    ctx.fillStyle = `rgba(212,175,55,${0.7+0.3*glow2})`;
    ctx.beginPath(); ctx.arc(w*0.5,h*0.09,4,0,Math.PI*2); ctx.fill();

    // Bâton ankh
    ctx.strokeStyle = '#d4af37'; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.moveTo(w*0.9,h*0.2); ctx.lineTo(w*0.9,h*0.95); ctx.stroke();
    ctx.beginPath(); ctx.arc(w*0.9,h*0.15,7,0,Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(w*0.82,h*0.28); ctx.lineTo(w*0.98,h*0.28); ctx.stroke();

  } else if(kind === 'tree_boss'){
    const auraG = ctx.createRadialGradient(w*0.5,h*0.35,w*0.08,w*0.5,h*0.35,w*0.9);
    auraG.addColorStop(0, `rgba(120,230,110,${0.28*pulse})`); auraG.addColorStop(1, 'rgba(120,230,110,0)');
    ctx.fillStyle = auraG; ctx.beginPath(); ctx.arc(w*0.5,h*0.35,w*0.9,0,Math.PI*2); ctx.fill();

    // Bras-branches noueux
    ctx.strokeStyle = '#4b3621'; ctx.lineWidth = 8; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(w*0.28,h*0.5); ctx.quadraticCurveTo(w*0.05,h*0.42+Math.sin(tick*0.1)*4,w*0.0,h*0.6); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(w*0.72,h*0.5); ctx.quadraticCurveTo(w*0.95,h*0.42-Math.sin(tick*0.1)*4,w*1.0,h*0.6); ctx.stroke();

    // Tronc texturé
    const trunkG = ctx.createLinearGradient(w*0.28,h*0.4,w*0.72,h*0.4);
    trunkG.addColorStop(0,'#2e2013'); trunkG.addColorStop(0.5,'#5a4028'); trunkG.addColorStop(1,'#2e2013');
    ctx.fillStyle = trunkG;
    ctx.beginPath(); ctx.moveTo(w*0.3,h*1.0); ctx.quadraticCurveTo(w*0.22,h*0.65,w*0.32,h*0.4); ctx.lineTo(w*0.68,h*0.4); ctx.quadraticCurveTo(w*0.78,h*0.65,w*0.7,h*1.0); ctx.closePath(); ctx.fill();
    ctx.strokeStyle = 'rgba(20,14,8,0.5)'; ctx.lineWidth = 1.6;
    for(let i=0;i<4;i++){ ctx.beginPath(); ctx.moveTo(w*0.36+i*w*0.08,h*0.45); ctx.lineTo(w*0.34+i*w*0.08,h*0.95); ctx.stroke(); }

    // Feuillage double couche avec dégradé
    ctx.fillStyle = '#1f5423';
    ctx.beginPath(); ctx.arc(w*0.5,h*0.26,w*0.48,0,Math.PI*2); ctx.fill();
    const foliageG = ctx.createRadialGradient(w*0.4,h*0.18,4,w*0.5,h*0.26,w*0.44);
    foliageG.addColorStop(0,'#5fbf5a'); foliageG.addColorStop(1,'#2c7a34');
    ctx.fillStyle = foliageG;
    ctx.beginPath(); ctx.arc(w*0.5,h*0.24,w*0.42,0,Math.PI*2); ctx.fill();

    // Visage sculpté dans l'écorce
    ctx.fillStyle = 'rgba(20,14,8,0.5)';
    ctx.beginPath(); ctx.ellipse(w*0.5,h*0.62,w*0.14,h*0.1,0,0,Math.PI*2); ctx.fill();

    // Yeux luminescents
    const eGlow = 0.6+0.4*Math.sin(tick*0.2);
    ctx.fillStyle = `rgba(180,255,140,${eGlow})`;
    ctx.beginPath(); ctx.arc(w*0.4,h*0.2,5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(w*0.6,h*0.2,5,0,Math.PI*2); ctx.fill();

    // Lucioles/pollen flottant autour de la cime
    ctx.fillStyle = `rgba(210,255,170,${0.5+0.5*Math.sin(tick*0.4)})`;
    for(let i=0;i<3;i++){
      const ang = tick*0.05 + i*2.1;
      ctx.beginPath(); ctx.arc(w*0.5+Math.cos(ang)*w*0.5, h*0.3+Math.sin(ang)*h*0.22, 2.4, 0, Math.PI*2); ctx.fill();
    }

  } else if(kind === 'ice_boss'){
    const auraG = ctx.createRadialGradient(w*0.5,h*0.4,w*0.08,w*0.5,h*0.4,w*0.9);
    auraG.addColorStop(0, `rgba(140,210,255,${0.28*pulse})`); auraG.addColorStop(1, 'rgba(140,210,255,0)');
    ctx.fillStyle = auraG; ctx.beginPath(); ctx.arc(w*0.5,h*0.4,w*0.9,0,Math.PI*2); ctx.fill();

    // Cape de glace translucide
    ctx.fillStyle = 'rgba(180,225,250,0.4)';
    ctx.beginPath();
    ctx.moveTo(w*0.16,h*0.4); ctx.quadraticCurveTo(w*0.0, h*0.8+Math.sin(tick*0.15)*5, w*0.12, h*1.02);
    ctx.lineTo(w*0.88,h*1.02);
    ctx.quadraticCurveTo(w*1.0, h*0.8-Math.sin(tick*0.15)*5, w*0.84,h*0.4);
    ctx.closePath(); ctx.fill();

    // Corps cristallin avec dégradé
    const iceG = ctx.createLinearGradient(w*0.2,h*0.32,w*0.8,h*0.32);
    iceG.addColorStop(0,'#c7e8fb'); iceG.addColorStop(0.5,'#eef8ff'); iceG.addColorStop(1,'#c7e8fb');
    ctx.fillStyle = iceG;
    roundRectPath(w*0.2,h*0.32,w*0.6,h*0.58,10); ctx.fill();
    ctx.strokeStyle = 'rgba(120,180,220,0.6)'; ctx.lineWidth = 2;
    ctx.strokeRect(w*0.2,h*0.32,w*0.6,h*0.58);

    // Facette cristalline interne
    ctx.fillStyle = 'rgba(159,212,238,0.6)';
    ctx.beginPath(); ctx.moveTo(w*0.5,h*0.32); ctx.lineTo(w*0.3,h*0.6); ctx.lineTo(w*0.7,h*0.6); ctx.closePath(); ctx.fill();

    // Couronne de glace
    ctx.fillStyle = '#dff0fb';
    ctx.beginPath();
    ctx.moveTo(w*0.22,h*0.3); ctx.lineTo(w*0.3,h*0.02); ctx.lineTo(w*0.42,h*0.22); ctx.lineTo(w*0.5,h*-0.02); ctx.lineTo(w*0.58,h*0.22); ctx.lineTo(w*0.7,h*0.02); ctx.lineTo(w*0.78,h*0.3);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = 'rgba(120,180,220,0.7)'; ctx.lineWidth = 1.4; ctx.stroke();

    // Yeux glacés luminescents
    const eyeGlow2 = 0.6+0.4*Math.sin(tick*0.3);
    ctx.fillStyle = `rgba(90,190,255,${eyeGlow2})`;
    ctx.beginPath(); ctx.arc(w*0.42,h*0.42,3.4,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(w*0.58,h*0.42,3.4,0,Math.PI*2); ctx.fill();

    // Éclats de givre flottants
    ctx.fillStyle = `rgba(255,255,255,${0.5+0.5*Math.sin(tick*0.35)})`;
    for(let i=0;i<4;i++){
      const ang = tick*0.04 + i*1.6;
      ctx.beginPath(); ctx.arc(w*0.5+Math.cos(ang)*w*0.55, h*0.5+Math.sin(ang)*h*0.35, 2, 0, Math.PI*2); ctx.fill();
    }
  }

  ctx.restore();
}

// Mur d'énergie infranchissable qui bloque l'accès au drapeau tant que le boss du niveau est vivant
function drawBossBarrier(bx, theme, tick){
  ctx.save();
  const pulse = 0.5 + 0.5*Math.sin(tick*0.08);
  const grad = ctx.createLinearGradient(bx-20,0,bx+20,0);
  grad.addColorStop(0, 'rgba(255,255,255,0)');
  grad.addColorStop(0.5, `rgba(${theme.accent[0]},${theme.accent[1]},${theme.accent[2]},${0.32+0.22*pulse})`);
  grad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(bx-20, -60, 40, HEIGHT+120);
  ctx.strokeStyle = `rgba(255,255,255,${0.45+0.3*pulse})`;
  ctx.lineWidth = 2;
  for(let ly=-30; ly<HEIGHT+60; ly+=28){
    const off = (tick*1.4 + ly*0.3) % 28;
    ctx.beginPath(); ctx.moveTo(bx-11, ly+off); ctx.lineTo(bx+11, ly+off-15); ctx.stroke();
  }
  ctx.restore();
}

function drawStar(cx, cy, rOuter, rInner, color){
  ctx.fillStyle = color;
  ctx.beginPath();
  for(let i=0;i<10;i++){
    const rad = i%2===0 ? rOuter : rInner;
    const ang = -Math.PI/2 + i*Math.PI/5;
    const px = cx+Math.cos(ang)*rad, py = cy+Math.sin(ang)*rad;
    if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
  }
  ctx.closePath(); ctx.fill();
}
