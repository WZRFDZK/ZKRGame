<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>ZKR - Le Boss de la Street </title>
<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #0b0810;
    display: flex; align-items: center; justify-content: center;
    font-family: Arial, Helvetica, sans-serif;

  }
  #wrap { text-align: center; }
  canvas {
    background: #000;

    margin: 0 auto;

    box-shadow: 0 0 40px rgba(0,0,0,0.6);
    image-rendering: pixelated;
  }

    color: #999; font-size: 13px; margin-top: 10px;

<body>
<div id="wrap">
  <canvas id="game" width="960" height="540"></canvas>
  <div id="hint">Flèches : se déplacer &nbsp;|&nbsp; Espace : sauter &nbsp;|&nbsp; Bas : s'accroupir / glisser</div>
</div>

<script>
const WIDTH = 960, HEIGHT = 540;
const GRAVITY = 0.85, MAX_FALL = 18, JUMP_VELOCITY = -16.5, MOVE_SPEED = 5.2;
const GROUND_Y = 460, DEATH_Y = 680;
const PLAYER_WIDTH = 42, PLAYER_HEIGHT = 76, PLAYER_CROUCH_HEIGHT = 46;

const WORLD_THEMES = [
  { name: "LA VILLE", bgTop: [18,14,38], bgBottom: [55,46,88], ground: [35,33,48], groundTop: [70,68,92], platform: [80,78,100], platformTop: [110,108,135], spike: [180,180,190], enemy: [25,25,25], accent: [60,140,255], deco: [32,26,53], clouds: [75,65,105] },
  { name: "LE DÉSERT", bgTop: [245,160,80], bgBottom: [255,215,130], ground: [196,148,84], groundTop: [224,178,110], platform: [170,122,70], platformTop: [206,160,100], spike: [120,80,45], enemy: [150,90,40], accent: [230,140,40], deco: [160,110,60], clouds: [255,240,210] },
  { name: "LA FORÊT", bgTop: [15,45,25], bgBottom: [45,95,55], ground: [60,90,45], groundTop: [90,130,60], platform: [100,75,50], platformTop: [60,140,70], spike: [90,60,40], enemy: [35,90,45], accent: [120,200,90], deco: [30,65,40], clouds: [80,120,95] },
  { name: "LA BANQUISE", bgTop: [120,175,210], bgBottom: [200,225,240], ground: [180,210,225], groundTop: [235,245,255], platform: [150,185,210], platformTop: [215,230,245], spike: [130,180,210], enemy: [110,145,180], accent: [90,160,220], deco: [155,195,220], clouds: [235,245,250] },
];

// Ennemis "de base" et boss par monde, calqués sur la DA (voyou cagoulé, scorpion, créature de forêt, bonhomme de neige / gros bras, pharaon, monstre-arbre, roi des glaces)
const ENEMY_KINDS = ['thug', 'scorpion', 'critter', 'snow'];
const BOSS_KINDS  = ['thug_boss', 'pharaoh_boss', 'tree_boss', 'ice_boss'];

const LEVEL_NAMES = ["NIVEAU 1", "NIVEAU 2", "NIVEAU 3", "NIVEAU 4", "NIVEAU BOSS"];

function rgb(c){ return `rgb(${c[0]},${c[1]},${c[2]})`; }
function mod(n, m){ return ((n % m) + m) % m; }

function coinArc(cx, cy, count=3, spacing=34){
  const start = cx - (count-1)*spacing/2;
  const coins = [];
  for(let i=0;i<count;i++) coins.push([start+i*spacing, cy]);
  return coins;
}

function buildLevel(opts){
  const segments = opts.segments || [];
  const platforms = opts.platforms || [];
  const coins = opts.coins || [];
  const spikes = opts.spikes || [];
  const enemies = opts.enemies || [];
  const groundRects = segments.map(s => ({x:s[0], y:GROUND_Y, w:s[1]-s[0], h:HEIGHT-GROUND_Y+80}));
  let platformRects = platforms.map(p => ({x:p[0], y:p[1], w:p[2], h:p[3]}));
  const spikeRects = spikes.map(s => ({x:s[0], y:s[1], w:s[2], h:s[3]}));
  const startX = (opts.startX !== undefined) ? opts.startX : 60;
  const startY = (opts.startY !== undefined) ? opts.startY : GROUND_Y - 80;
  const goalY = (opts.goalY !== undefined) ? opts.goalY : GROUND_Y;

  const spawnPlatform = {x: startX - 70, y: startY + PLAYER_HEIGHT, w: 280, h: 24};
  platformRects = platformRects.concat([spawnPlatform]);

  return {
    groundRects, platformRects,
    solids: groundRects.concat(platformRects),
    coins: coins.map(c => ({x:c[0], y:c[1], taken:false})),
    spikes: spikeRects,
    enemyData: enemies,
    goalX: opts.goalX, goalY: goalY,
    width: opts.width, startX, startY
  };
}

function archetypeClassic(worldIndex){
  const length = 2300 + worldIndex*150;
  const gapW = 70 + worldIndex*8;
  const gaps = [520, 1150, 1750, 2200];
  const segments = [];
  let prev = 0;
  for(const g of gaps){ if(g < length){ segments.push([prev, g]); prev = g + gapW; } }
  segments.push([prev, length+250]);

  let coins = [];
  for(const cx of [240, 780, 1350, 1900]) coins = coins.concat(coinArc(cx, GROUND_Y-50));
  const enemies = [
    {x:640, y:GROUND_Y-60, left:600, right:940, speed:1.4+worldIndex*0.2},
    {x:1780, y:GROUND_Y-60, left:1730, right:2060, speed:1.4+worldIndex*0.2},
  ];
  return buildLevel({segments, coins, enemies, goalX: length + 130, width: length+300});
}

function archetypeStairs(worldIndex){
  const platforms = [], coins = [], enemies = [];
  const stepW = 140, stepH = 20;
  const nSteps = 5 + (worldIndex >= 2 ? 1 : 0);

  let curX = 220, curY = GROUND_Y - 40; 
  for(let i=0;i<nSteps;i++){
    platforms.push([curX, curY, stepW, stepH]);
    coins.push([curX+stepW/2, curY-45]);
    if(i%2===1) enemies.push({x:curX+20, y:curY-60, left:curX, right:curX+stepW-44, speed:1.2+worldIndex*0.15});
    curX += stepW+55; curY -= 45;
  }

  const plateauX = curX, plateauY = curY;
  platforms.push([plateauX, plateauY, 230, stepH]);
  for(const c of coinArc(plateauX+115, plateauY-45, 3)) coins.push(c);

  curX = plateauX+230+55; curY = plateauY + 45;
  for(let i=0; i<nSteps; i++){
    platforms.push([curX, curY, stepW, stepH]);
    if(i%2===0) coins.push([curX+stepW/2, curY-45]);
    curX += stepW+55; curY += 45;
  }

  const groundStart = curX - 40;
  const length = curX + 420;
  const segments = [[0, 300], [groundStart, length]];
  return buildLevel({segments, platforms, coins, enemies, goalX: length - 120, width: length+150});
}

function archetypeFloating(worldIndex){
  const length = 2500 + worldIndex*200;
  const spikes = [[0, GROUND_Y, length+200, 40]];
  const platforms = [], enemies = [];
  let curX = 160;
  let coins = [];
  const heights = [GROUND_Y-90, GROUND_Y-165, GROUND_Y-115, GROUND_Y-205, GROUND_Y-135, GROUND_Y-175, GROUND_Y-100];
  if(worldIndex >= 2) heights.push(GROUND_Y-190);

  heights.forEach((h, i) => {
    platforms.push([curX, h, 150, 20]);
    coins = coins.concat(coinArc(curX+75, h-42, 2));
    if(i%2===0) enemies.push({x:curX+35, y:h-60, left:curX, right:curX+106, speed:1.3+worldIndex*0.2});
    curX += 275 + worldIndex*8;
  });

  platforms.push([curX, GROUND_Y-95, 220, 20]);
  return buildLevel({platforms, coins, spikes, enemies, goalX: curX+110, width: curX+520, startX: 200, startY: heights[0]-90, goalY: GROUND_Y-95});
}

function archetypeTraps(worldIndex){
  const nClusters = 5 + worldIndex, length = 300 + nClusters*350 + 300;
  const segments = [[0, length]], spikes = [], platforms = [], enemies = [];
  let coins = [];
  let curX = 340;
  for(let i=0;i<nClusters;i++){
    spikes.push([curX, GROUND_Y-22, 90+worldIndex*6, 22]);
    platforms.push([curX-25, GROUND_Y-150, 180+worldIndex*6, 20]);
    coins = coins.concat(coinArc(curX+45, GROUND_Y-190, 2));
    if(i%2===0) enemies.push({x:curX+260, y:GROUND_Y-60, left:curX+210, right:curX+380, speed:1.5+worldIndex*0.25});
    curX += 350;
  }
  return buildLevel({segments, platforms, coins, spikes, enemies, goalX: curX + 150, width: length+200});
}

function archetypeGauntlet(worldIndex){
  // Gouffre à pièges : petites plateformes de sol séparées par des fosses de pics, avec un chemin aérien alternatif
  const nGaps = 6 + worldIndex;
  const spikes = [], platforms = [], enemies = [];
  let coins = [];
  const segments = [];
  let prevEnd = 300;
  segments.push([0, prevEnd]);
  for(let i=0;i<nGaps;i++){
    const gapW = 85 + worldIndex*6;
    spikes.push([prevEnd, GROUND_Y-18, gapW, 18]);
    const landStart = prevEnd + gapW, landLen = 150;
    segments.push([landStart, landStart + landLen]);
    if(i % 2 === 0){
      platforms.push([prevEnd + gapW/2 - 45, GROUND_Y-115, 90, 18]);
      coins.push([prevEnd + gapW/2, GROUND_Y-145]);
    } else {
      coins.push([landStart + landLen/2, GROUND_Y-55]);
    }
    if(i % 3 === 1) enemies.push({x: landStart+20, y:GROUND_Y-60, left: landStart, right: landStart+landLen-44, speed:1.6+worldIndex*0.25});
    prevEnd = landStart + landLen;
  }
  const length = prevEnd + 260;
  segments.push([prevEnd, length]);
  return buildLevel({segments, platforms, coins, spikes, enemies, goalX: length-140, width: length+150});
}

function archetypeZigzag(worldIndex){
  // Plateformes en zigzag au-dessus d'une fosse continue : rythme de saut haut/bas
  const nPlat = 9 + worldIndex;
  const platforms = [], enemies = [];
  let coins = [];
  let curX = 180;
  const baseY = GROUND_Y - 140, amp = 56;
  for(let i=0;i<nPlat;i++){
    const y = baseY + (i % 2 === 0 ? -amp : amp) + (i % 4 === 0 ? -18 : 0);
    platforms.push([curX, y, 130, 20]);
    coins = coins.concat(coinArc(curX+65, y-40, 2, 26));
    if(i % 3 === 2) enemies.push({x:curX+30, y:y-60, left:curX, right:curX+96, speed:1.3+worldIndex*0.2});
    curX += 210 + worldIndex*6;
  }
  platforms.push([curX, GROUND_Y-100, 220, 20]);
  const length = curX + 500;
  const spikes = [[0, GROUND_Y, length, 40]];
  return buildLevel({platforms, coins, spikes, enemies, goalX: curX+110, width: length, startX:200, startY: baseY-90, goalY: GROUND_Y-100});
}

function archetypeCorridor(worldIndex){
  // Couloir au sol avec des plafonds bas : il faut s'accroupir/glisser pour passer dessous
  const nTunnels = 4 + worldIndex;
  const platforms = [], enemies = [];
  let coins = [];
  let curX = 500;
  for(let i=0;i<nTunnels;i++){
    const tunnelLen = 220;
    platforms.push([curX, GROUND_Y-70, tunnelLen, 22]); // plafond bas : oblige à s'accroupir pour passer
    coins = coins.concat(coinArc(curX+tunnelLen/2, GROUND_Y-42, 2, 40));
    curX += tunnelLen + 260;
    if(i % 2 === 0) enemies.push({x:curX-140, y:GROUND_Y-60, left:curX-240, right:curX-40, speed:1.4+worldIndex*0.2});
  }
  const length = curX + 320;
  const segments = [[0, length]];
  return buildLevel({segments, platforms, coins, enemies, goalX: length-150, width: length+150});
}

function archetypeIslandRun(worldIndex){
  // Îlots isolés de tailles et hauteurs irrégulières au-dessus du vide : place à la précision
  const n = 8 + worldIndex;
  const platforms = [], enemies = [];
  let coins = [];
  let curX = 200;
  for(let i=0;i<n;i++){
    const w = 70 + ((i*37 + worldIndex*13) % 3) * 30;
    const yOff = 90 + ((i*53 + worldIndex*7) % 5) * 28;
    const y = GROUND_Y - yOff;
    platforms.push([curX, y, w, 18]);
    if(i % 2 === 0) coins.push([curX+w/2, y-35]);
    else coins = coins.concat(coinArc(curX+w/2, y-35, 2, 22));
    if(i % 4 === 3) enemies.push({x:curX+10, y:y-58, left:curX, right:curX+Math.max(w-44,20), speed:1.3+worldIndex*0.2});
    curX += w + 130 + worldIndex*6;
  }
  platforms.push([curX, GROUND_Y-100, 220, 20]);
  const length = curX + 520;
  const spikes = [[0, GROUND_Y, length, 40]];
  return buildLevel({platforms, coins, spikes, enemies, goalX: curX+110, width: length, startX:200, startY: GROUND_Y-190, goalY: GROUND_Y-100});
}

function archetypeFinal(worldIndex){
  const length = 3100 + worldIndex*250, segments = [[0, length+400]], platforms = [], spikes = [], enemies = [];
  let coins = coinArc(230, GROUND_Y-50);
  let fx = 1120;
  [90,150,110,180].forEach((dy, i) => {
    platforms.push([fx, GROUND_Y-dy, 130, 20]);
    coins = coins.concat(coinArc(fx+65, GROUND_Y-dy-40, 2));
    fx += 250;
  });
  // Arène du boss : une plateforme dégagée avant l'objectif, avec le boss du monde
  const arenaX = length - 520;
  const bossX = arenaX + 260;
  enemies.push({
    x: bossX, y: GROUND_Y-100, left: arenaX+60, right: arenaX+460,
    speed: 1.6 + worldIndex*0.3, w: 80, h: 100, hp: 4 + worldIndex, isBoss: true
  });
  return buildLevel({segments, platforms, coins, spikes, enemies, goalX: length+130, width: length+400});
}

// Bassin des styles de niveaux "normaux" (le niveau boss est toujours généré à part par archetypeFinal)
const NORMAL_ARCHETYPES = [archetypeClassic, archetypeZigzag, archetypeFloating, archetypeCorridor, archetypeStairs, archetypeGauntlet, archetypeIslandRun, archetypeTraps];

function generateLevel(wIdx, lIdx){
  if(lIdx >= 4) return archetypeFinal(wIdx); // NIVEAU BOSS : toujours un vrai combat de boss
  // On fait tourner le bassin de styles avec un décalage différent à chaque monde (pas premier avec la taille du bassin)
  // pour qu'aucun monde ne rejoue la même séquence de styles qu'un autre.
  const slot = (wIdx * 3 + lIdx) % NORMAL_ARCHETYPES.length;
  return NORMAL_ARCHETYPES[slot](wIdx);
}

function rectsOverlap(a, b){ return !(a.x+a.w <= b.x || a.x >= b.x+b.w || a.y+a.h <= b.y || a.y >= b.y+b.h); }

class Enemy {
  constructor(x, y, left, right, speed, opts={}){
    this.x=x; this.y=y; this.left=left; this.right=right; this.speed=speed; this.dir=1; this.alive=true;
    this.w = opts.w || 44; this.h = opts.h || 58;
    this.isBoss = !!opts.isBoss; this.maxHp = opts.hp || 1; this.hp = this.maxHp;
    this.kind = opts.kind || 'thug';
    this.hitFlash = 0;
  }
  get rect(){ return {x:this.x, y:this.y, w:this.w, h:this.h}; }
  hit(){
    this.hp--; this.hitFlash = 10;
    if(this.hp <= 0) this.alive = false;
  }
  update(){
    if(!this.alive) return;
    if(this.hitFlash > 0) this.hitFlash--;
    this.x += this.speed*this.dir;
    if(this.x < this.left){ this.x = this.left; this.dir = 1; }
    else if(this.x+this.w > this.right){ this.x = this.right-this.w; this.dir = -1; }
  }
}

class Player {
  constructor(){ this.x=0; this.y=0; this.vx=0; this.vy=0; this.w=PLAYER_WIDTH; this.h=PLAYER_HEIGHT; this.onGround=false; this.invincibleTimer=0; this.facing=1; this.slideTimer=0; }
  get rect(){ return {x:this.x, y:this.y, w:this.w, h:this.h}; }
  reset(x, y){ this.x=x; this.y=y; this.vx=0; this.vy=0; this.h=PLAYER_HEIGHT; this.onGround=false; this.invincibleTimer=60; this.slideTimer=0; }
  update(keys, solids){
    const left = !!keys['ArrowLeft'] || !!keys['q'] || !!keys['Q'];
    const right = !!keys['ArrowRight'] || !!keys['d'] || !!keys['D'];
    const down = !!keys['ArrowDown'] || !!keys['s'] || !!keys['S'];
    const jump = !!keys[' '];

    if(left) this.facing = -1; else if(right) this.facing = 1;

    // Trigger a slide when crouching while moving on the ground (not already sliding/crouched)
    if(down && this.onGround && this.slideTimer <= 0 && this.h === PLAYER_HEIGHT && Math.abs(this.vx) > 0.1){
      this.slideTimer = 22;
    }

    let isCrouching = (down && this.onGround) || this.slideTimer > 0;
    let targetH = isCrouching ? PLAYER_CROUCH_HEIGHT : PLAYER_HEIGHT;
    if(targetH !== this.h) { this.y += (this.h - targetH); this.h = targetH; }

    if(this.slideTimer > 0){
      this.slideTimer--;
      this.vx = this.facing * MOVE_SPEED * 1.7;
    } else if(isCrouching){
      this.vx = 0;
    } else if(left){
      this.vx = -MOVE_SPEED;
    } else if(right){
      this.vx = MOVE_SPEED;
    } else {
      this.vx = 0;
    }

    if(jump && this.onGround && !isCrouching){ this.vy = JUMP_VELOCITY; this.onGround = false; }
    this.x += this.vx;
    if(this.x < 0) this.x = 0;
    for(const s of solids){ if(rectsOverlap(this.rect, s)){ if(this.vx > 0) this.x = s.x - this.w; else if(this.vx < 0) this.x = s.x + s.w; } }
    this.vy += GRAVITY; if(this.vy > MAX_FALL) this.vy = MAX_FALL;
    this.y += this.vy; this.onGround = false;
    for(const s of solids){ if(rectsOverlap(this.rect, s)){ if(this.vy > 0){ this.y = s.y - this.h; this.vy = 0; this.onGround = true; } else if(this.vy < 0){ this.y = s.y + s.h; this.vy = 0; } } }
    if(this.invincibleTimer > 0) this.invincibleTimer--;
  }
}

// ===================== RENDU "DA ZKR" =====================
// Palette perso : peau ambrée, hoodie/jogging noir à bande bleue,
// casque rouge/bleu, chaîne, sneakers bleu/blanc, afro noire.

function roundRectPath(x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y, x+w, y+h, r);
  ctx.arcTo(x+w, y+h, x, y+h, r);
  ctx.arcTo(x, y+h, x, y, r);
  ctx.arcTo(x, y, x+w, y, r);
  ctx.closePath();
}

function drawPlayerSprite(x, y, w, h, dir, vx, onGround, crouching, tick){
  ctx.save();
  ctx.translate(x, y);
  if(dir < 0){ ctx.translate(w, 0); ctx.scale(-1, 1); }

  // Palette calquée sur la charte ZKR (peau ambrée, hoodie noir/bleu, casque rouge/bleu, afro, sneakers bicolores)
  const skin = '#c9884f';
  const skinShade = '#a8703f';
  const hoodie = '#14141a';
  const hoodieLight = '#20202a';
  const accent = '#2f6fe0';
  const accentLight = '#5b93f0';
  const hair = '#151018';
  const hairHi = '#241a26';
  const shoeWhite = '#f1f5fa';
  const shoeBlack = '#15151a';
  const silver = '#e9e9ee';

  const headR = w*0.36;
  const headCX = w*0.5, headCY = headR + 2;
  const torsoTop = headCY + headR*0.72;
  const torsoBot = h*0.72;
  const legTop = torsoBot, legBot = h;
  const torsoH = torsoBot - torsoTop;

  const speedRatio = Math.min(Math.abs(vx)/MOVE_SPEED, 1);
  const swing = onGround && !crouching ? Math.sin(tick*0.4)*8*speedRatio : (onGround ? 0 : 4);
  const legW = w*0.29, legGap = 2;

  // ---- jambes (jogging noir + bande bleue latérale) ----
  ctx.fillStyle = hoodie;
  ctx.fillRect(w*0.5-legW-legGap - swing*0.3, legTop, legW, legBot-legTop-7);
  ctx.fillRect(w*0.5+legGap + swing*0.3, legTop, legW, legBot-legTop-7);
  ctx.fillStyle = accent;
  ctx.fillRect(w*0.5-legW-legGap - swing*0.3, legTop, 4.5, legBot-legTop-7);
  ctx.fillRect(w*0.5+legGap+legW-4.5 + swing*0.3, legTop, 4.5, legBot-legTop-7);

  // ---- sneakers bicolores (style Jordan 1 : cuir blanc, empiècement bleu, bout/semelle noirs) ----
  const shoeY = legBot-9, shoeH = 9;
  [[w*0.5-legW-legGap-3 - swing*0.3, -1], [w*0.5+legGap-3 + swing*0.3, 1]].forEach(([sx, side])=>{
    ctx.fillStyle = shoeWhite;
    ctx.fillRect(sx, shoeY, legW+6, shoeH);
    ctx.fillStyle = accent;
    ctx.fillRect(sx+ (side<0?legW-6:2), shoeY+1, 10, shoeH-3);
    ctx.fillStyle = shoeBlack;
    ctx.fillRect(sx, shoeY+shoeH-3, legW+6, 3); // semelle
    ctx.fillRect(sx + (side<0? -1 : legW), shoeY-1, 6, 5); // bout renforcé
  });

  // ---- bras (manches hoodie + poignets) ----
  const armSwing = onGround && !crouching ? Math.sin(tick*0.4+Math.PI)*6*speedRatio : 0;
  const armLen = torsoH*0.8;
  ctx.fillStyle = hoodie;
  ctx.fillRect(w*0.5-w*0.46-2, torsoTop+2+armSwing*0.4, 9.5, armLen);
  ctx.fillRect(w*0.5+w*0.46-7.5, torsoTop+2-armSwing*0.4, 9.5, armLen);
  ctx.fillStyle = accent;
  ctx.fillRect(w*0.5-w*0.46-2, torsoTop+2+armSwing*0.4+armLen-9, 9.5, 3); // poignet côtelé
  ctx.fillRect(w*0.5+w*0.46-7.5, torsoTop+2-armSwing*0.4+armLen-9, 9.5, 3);
  ctx.fillStyle = skin;
  ctx.beginPath(); ctx.arc(w*0.5-w*0.46+2.5, torsoTop+2+armSwing*0.4+armLen, 5.5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(w*0.5+w*0.46-2.5, torsoTop+2-armSwing*0.4+armLen, 5.5, 0, Math.PI*2); ctx.fill();

  // ---- torse (hoodie zippé + bande bleue + col) ----
  const torsoGrad = ctx.createLinearGradient(w*0.5-w*0.42, torsoTop, w*0.5+w*0.42, torsoTop);
  torsoGrad.addColorStop(0, hoodie); torsoGrad.addColorStop(0.5, hoodieLight); torsoGrad.addColorStop(1, hoodie);
  ctx.fillStyle = torsoGrad;
  roundRectPath(w*0.5-w*0.42, torsoTop, w*0.84, torsoH, 6);
  ctx.fill();
  ctx.fillStyle = accent;
  ctx.fillRect(w*0.5+w*0.29, torsoTop, 6.5, torsoH); // bande bleue
  ctx.strokeStyle = '#0b0b0f'; ctx.lineWidth = 1.4; // zip central
  ctx.beginPath(); ctx.moveTo(w*0.5-1, torsoTop+4); ctx.lineTo(w*0.5-1, torsoBot-2); ctx.stroke();
  ctx.fillStyle = hoodieLight; // col capuche
  ctx.beginPath(); ctx.moveTo(w*0.5-w*0.24, torsoTop); ctx.lineTo(w*0.5, torsoTop+9); ctx.lineTo(w*0.5+w*0.24, torsoTop); ctx.closePath(); ctx.fill();

  // ---- chaîne + plaque "ZKR" ----
  ctx.strokeStyle = silver; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(w*0.5-9, torsoTop+3); ctx.quadraticCurveTo(w*0.5, torsoTop+17, w*0.5+9, torsoTop+3); ctx.stroke();
  ctx.fillStyle = silver;
  ctx.fillRect(w*0.5-6, torsoTop+15, 12, 7);
  ctx.fillStyle = accent;
  ctx.fillRect(w*0.5-4.5, torsoTop+16.5, 9, 2.2);

  // ---- tête ----
  const skinGrad = ctx.createRadialGradient(headCX-headR*0.3, headCY-headR*0.3, headR*0.2, headCX, headCY, headR*1.1);
  skinGrad.addColorStop(0, skin); skinGrad.addColorStop(1, skinShade);
  ctx.fillStyle = skinGrad;
  ctx.beginPath(); ctx.arc(headCX, headCY, headR, 0, Math.PI*2); ctx.fill();

  // oreilles
  ctx.fillStyle = skin;
  ctx.beginPath(); ctx.arc(headCX-headR*0.98, headCY+headR*0.15, headR*0.22, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(headCX+headR*0.98, headCY+headR*0.15, headR*0.22, 0, Math.PI*2); ctx.fill();

  // afro volumineuse (plusieurs lobes pour le côté touffu de la référence)
  ctx.fillStyle = hair;
  ctx.beginPath(); ctx.arc(headCX, headCY-headR*0.62, headR*0.95, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(headCX-headR*0.88, headCY-headR*0.22, headR*0.62, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(headCX+headR*0.88, headCY-headR*0.22, headR*0.62, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(headCX-headR*0.35, headCY-headR*1.02, headR*0.55, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(headCX+headR*0.35, headCY-headR*1.02, headR*0.55, 0, Math.PI*2); ctx.fill();
  // reflets bouclés (petits arcs plus clairs pour la texture)
  ctx.fillStyle = hairHi;
  for(let i=0;i<5;i++){
    const ang = -Math.PI*0.85 + i*0.42;
    const rx = headCX + Math.cos(ang)*headR*0.72, ry = headCY-headR*0.5 + Math.sin(ang)*headR*0.62;
    ctx.beginPath(); ctx.arc(rx, ry, headR*0.16, 0, Math.PI*2); ctx.fill();
  }

  // casque audio (bandeau + grosses oreillettes rouge gauche / bleue droite + micro)
  ctx.strokeStyle = '#0c0c10'; ctx.lineWidth = 4.5;
  ctx.beginPath(); ctx.arc(headCX, headCY-4, headR*1.12, Math.PI*1.12, Math.PI*1.88); ctx.stroke();
  // oreillette gauche (rouge)
  ctx.fillStyle = '#8f1717';
  ctx.beginPath(); ctx.arc(headCX-headR*1.0, headCY+headR*0.12, headR*0.46, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#e13030';
  ctx.beginPath(); ctx.arc(headCX-headR*1.0, headCY+headR*0.12, headR*0.34, 0, Math.PI*2); ctx.fill();
  // oreillette droite (bleue) + micro
  ctx.fillStyle = '#1f4fa8';
  ctx.beginPath(); ctx.arc(headCX+headR*1.0, headCY+headR*0.12, headR*0.46, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = accentLight;
  ctx.beginPath(); ctx.arc(headCX+headR*1.0, headCY+headR*0.12, headR*0.34, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#111'; ctx.lineWidth = 2.4;
  ctx.beginPath(); ctx.moveTo(headCX+headR*0.78, headCY+headR*0.42); ctx.quadraticCurveTo(headCX+headR*0.55, headCY+headR*0.78, headCX+headR*0.22, headCY+headR*0.9); ctx.stroke();
  ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(headCX+headR*0.22, headCY+headR*0.9, 2.4, 0, Math.PI*2); ctx.fill();

  // visage concentré (sourcils froncés façon référence)
  ctx.strokeStyle = '#1a1208'; ctx.lineWidth = 2.4; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(headCX+headR*0.04, headCY-headR*0.28); ctx.lineTo(headCX+headR*0.32, headCY-headR*0.4); ctx.stroke();
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(headCX+headR*0.06, headCY-2, 5, 5.5);
  ctx.fillRect(headCX+headR*0.5, headCY-2, 5, 5.5);
  ctx.strokeStyle = '#7a4a28'; ctx.lineWidth = 1.6;
  ctx.beginPath(); ctx.moveTo(headCX+headR*0.18, headCY+headR*0.45); ctx.lineTo(headCX+headR*0.5, headCY+headR*0.4); ctx.stroke();

  // traînée de glisse (petit effet de vitesse quand on slide accroupi en mouvement)
  if(crouching && Math.abs(vx) > MOVE_SPEED){
    ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 2;
    for(let i=0;i<3;i++){ ctx.beginPath(); ctx.moveTo(-4-i*6, legBot-6); ctx.lineTo(-14-i*6, legBot-6); ctx.stroke(); }
  }

  ctx.restore();
}

function drawEnemySprite(kind, x, y, w, h, tick, dir){
  ctx.save(); ctx.translate(x, y);
  if(dir < 0){ ctx.translate(w, 0); ctx.scale(-1, 1); }

  if(kind === 'thug'){
    // Voyou cagoulé façon rooftop de la référence : hoodie noir, cagoule ronde, fente des yeux rouge, chaîne dorée
    ctx.fillStyle = '#0f0f13';
    roundRectPath(w*0.12, h*0.4, w*0.76, h*0.6, 8); ctx.fill();
    ctx.fillStyle = '#1a1a20';
    ctx.beginPath(); ctx.arc(w*0.5, h*0.32, w*0.42, Math.PI, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#0f0f13';
    ctx.beginPath(); ctx.arc(w*0.5, h*0.36, w*0.4, 0, Math.PI*2); ctx.fill(); // cagoule
    ctx.fillStyle = '#d92b2b';
    ctx.fillRect(w*0.24,h*0.33,w*0.2,5.5);
    ctx.fillRect(w*0.56,h*0.33,w*0.2,5.5);
    ctx.strokeStyle = '#d4af37'; ctx.lineWidth = 2.4;
    ctx.beginPath(); ctx.moveTo(w*0.32,h*0.55); ctx.quadraticCurveTo(w*0.5,h*0.64,w*0.68,h*0.55); ctx.stroke();
  } else if(kind === 'scorpion'){
    const legWig = Math.sin(tick*0.5)*3;
    const shellGrad = ctx.createLinearGradient(0,h*0.35,0,h);
    shellGrad.addColorStop(0,'#c97a28'); shellGrad.addColorStop(1,'#8a4a15');
    ctx.fillStyle = shellGrad;
    ctx.beginPath(); ctx.ellipse(w*0.48,h*0.65,w*0.5,h*0.32,0,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#7a3f10'; ctx.lineWidth = 1.6;
    for(let i=0;i<3;i++){ ctx.beginPath(); ctx.arc(w*0.48,h*0.65,w*0.42-i*7,0.15*Math.PI,0.85*Math.PI); ctx.stroke(); }
    ctx.strokeStyle = '#b5651d'; ctx.lineWidth = 8;
    ctx.beginPath(); ctx.moveTo(w*0.15,h*0.55); ctx.quadraticCurveTo(-w*0.2,h*0.15+legWig,w*0.05,-h*0.05); ctx.stroke();
    ctx.fillStyle = '#7a3f10';
    ctx.beginPath(); ctx.arc(w*0.05,-h*0.05,7,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#8a4a15';
    ctx.fillRect(w*0.85,h*0.48,w*0.22,7);
    ctx.fillRect(w*0.85,h*0.68,w*0.22,7);
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(w*0.18,h*0.55,4,4); ctx.fillRect(w*0.3,h*0.5,4,4);
  } else if(kind === 'critter'){
    const bob = Math.sin(tick*0.3)*2;
    const critGrad = ctx.createRadialGradient(w*0.4,h*0.4+bob,4,w*0.5,h*0.55+bob,w*0.5);
    critGrad.addColorStop(0,'#63cf6e'); critGrad.addColorStop(1,'#2f8a3a');
    ctx.fillStyle = critGrad;
    ctx.beginPath(); ctx.arc(w*0.5,h*0.55+bob,w*0.48,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#1e6b28';
    ctx.beginPath(); ctx.ellipse(w*0.5,h*0.62+bob,w*0.28,h*0.14,0,0,Math.PI); ctx.fill();
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(w*0.32,h*0.45+bob,6,6); ctx.fillRect(w*0.6,h*0.45+bob,6,6);
    ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(w*0.5,h*0.6+bob,8,0,Math.PI); ctx.stroke();
    ctx.fillStyle = '#3fae4a';
    ctx.beginPath(); ctx.arc(w*0.5,h*0.08+bob,5,0,Math.PI*2); ctx.fill();
  } else if(kind === 'snow'){
    ctx.fillStyle = 'rgba(180,210,230,0.35)';
    ctx.beginPath(); ctx.ellipse(w*0.5,h*0.98,w*0.5,6,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#f2f7fb';
    ctx.beginPath(); ctx.arc(w*0.5,h*0.72,w*0.42,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(w*0.5,h*0.32,w*0.32,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#c3d8e8'; ctx.lineWidth = 1.4;
    ctx.beginPath(); ctx.arc(w*0.5,h*0.72,w*0.42,0.15*Math.PI,0.85*Math.PI); ctx.stroke();
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(w*0.4,h*0.28,4,4); ctx.fillRect(w*0.56,h*0.28,4,4);
    ctx.fillRect(w*0.38,h*0.62,4,4); ctx.fillRect(w*0.5,h*0.65,4,4); ctx.fillRect(w*0.6,h*0.62,4,4);
    ctx.fillStyle = '#e07b1a';
    ctx.beginPath(); ctx.moveTo(w*0.5,h*0.36); ctx.lineTo(w*0.72,h*0.4); ctx.lineTo(w*0.5,h*0.42); ctx.fill();
  }
  ctx.restore();
}

function drawBossSprite(kind, x, y, w, h, tick, dir){
  ctx.save(); ctx.translate(x, y);
  if(dir < 0){ ctx.translate(w, 0); ctx.scale(-1, 1); }

  if(kind === 'thug_boss'){
    const tGrad = ctx.createLinearGradient(w*0.15,h*0.32,w*0.85,h*0.32);
    tGrad.addColorStop(0,'#0f0f13'); tGrad.addColorStop(0.5,'#22222c'); tGrad.addColorStop(1,'#0f0f13');
    ctx.fillStyle = tGrad;
    ctx.fillRect(w*0.15,h*0.32,w*0.7,h*0.58);
    ctx.fillStyle = '#2f6fe0';
    ctx.fillRect(w*0.15,h*0.32,4,h*0.58); ctx.fillRect(w*0.81,h*0.32,4,h*0.58);
    ctx.fillStyle = '#c9884f';
    ctx.beginPath(); ctx.arc(w*0.5,h*0.18,w*0.28,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#d4af37'; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.moveTo(w*0.34,h*0.34); ctx.quadraticCurveTo(w*0.5,h*0.46,w*0.66,h*0.34); ctx.stroke();
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(w*0.38,h*0.15,6,6); ctx.fillRect(w*0.56,h*0.15,6,6);
    ctx.fillRect(w*0.36,h*0.08,0.28*w,3);
  } else if(kind === 'pharaoh_boss'){
    ctx.fillStyle = '#1c3f8f';
    ctx.fillRect(w*0.2,h*0.36,w*0.6,h*0.54);
    ctx.fillStyle = '#d4af37';
    ctx.beginPath(); ctx.moveTo(w*0.14,h*0.36); ctx.lineTo(w*0.5,h*0.04); ctx.lineTo(w*0.86,h*0.36); ctx.fill();
    ctx.fillStyle = '#c9884f';
    ctx.beginPath(); ctx.arc(w*0.5,h*0.28,w*0.2,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#1a1a1a'; ctx.fillRect(w*0.42,h*0.25,5,5); ctx.fillRect(w*0.55,h*0.25,5,5);
    ctx.strokeStyle = '#d4af37'; ctx.lineWidth = 5;
    ctx.beginPath(); ctx.moveTo(w*0.88,h*0.2); ctx.lineTo(w*0.88,h*0.92); ctx.stroke();
    ctx.beginPath(); ctx.arc(w*0.88,h*0.18,7,0,Math.PI*2); ctx.fillStyle='#d4af37'; ctx.fill();
  } else if(kind === 'tree_boss'){
    ctx.fillStyle = '#4b3621';
    ctx.fillRect(w*0.3,h*0.42,w*0.4,h*0.5);
    ctx.fillStyle = '#2f6b32';
    ctx.beginPath(); ctx.arc(w*0.5,h*0.28,w*0.42,0,Math.PI*2); ctx.fill();
    const glow = 0.6+0.4*Math.sin(tick*0.2);
    ctx.fillStyle = `rgba(155,227,106,${glow})`;
    ctx.beginPath(); ctx.arc(w*0.38,h*0.24,6,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(w*0.6,h*0.24,6,0,Math.PI*2); ctx.fill();
  } else if(kind === 'ice_boss'){
    ctx.fillStyle = '#dff0fb';
    ctx.fillRect(w*0.22,h*0.36,w*0.56,h*0.54);
    ctx.fillStyle = '#9fd4ee';
    ctx.beginPath(); ctx.moveTo(w*0.5,h*0.36); ctx.lineTo(w*0.28,h*0.62); ctx.lineTo(w*0.72,h*0.62); ctx.fill();
    ctx.fillStyle = '#d4af37';
    ctx.beginPath(); ctx.moveTo(w*0.3,h*0.3); ctx.lineTo(w*0.5,h*0.04); ctx.lineTo(w*0.7,h*0.3); ctx.fill();
    ctx.fillStyle = '#1a1a1a'; ctx.fillRect(w*0.4,h*0.3,5,5); ctx.fillRect(w*0.56,h*0.3,5,5);
  }
  ctx.restore();
}

function drawStar(cx, cy, rOuter, rInner, color){
  ctx.fillStyle = color;
  ctx.beginPath();
  for(let i=0;i<10;i++){
    const rad = i%2===0 ? rOuter : rInner;
    const ang = -Math.PI/2 + i*Math.PI/5;
    const px = cx+Math.cos(ang)*rad, py = cy+Math.sin(ang)*rad;
    if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
  }
  ctx.closePath(); ctx.fill();
}

// ============================================================

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const STATE_MENU = 0, STATE_PLAYING = 1, STATE_LEVEL_CLEAR = 2, STATE_GAME_OVER = 3, STATE_VICTORY = 4;
let state = STATE_MENU, worldIndex = 0, levelIndex = 0, lives = 3, score = 0, cameraX = 0, levelTransitionTimer = 0, frameTick = 0;
let level = null, player = new Player(), enemies = [], keys = {};

function initLevel(){
  level = generateLevel(worldIndex, levelIndex);
  player.reset(level.startX, level.startY);
  enemies = level.enemyData.map(e => new Enemy(e.x, e.y, e.left, e.right, e.speed, {
    ...e, kind: e.isBoss ? BOSS_KINDS[worldIndex] : ENEMY_KINDS[worldIndex]
  }));
  cameraX = 0;
}

const HANDLED_KEYS = [' ', 'ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown'];
window.addEventListener('keydown', e => {
  if(HANDLED_KEYS.includes(e.key)) e.preventDefault(); // évite que la page défile pendant qu'on joue
  keys[e.key] = true;
  if(e.key === ' ' && (state === STATE_MENU || state === STATE_GAME_OVER || state === STATE_VICTORY)){
    if(state === STATE_GAME_OVER || state === STATE_VICTORY){ worldIndex = 0; levelIndex = 0; lives = 3; score = 0; }
    state = STATE_PLAYING; initLevel();
  }
});
window.addEventListener('keyup', e => { keys[e.key] = false; });
window.addEventListener('blur', () => { keys = {}; }); // évite les touches "bloquées" si la fenêtre perd le focus

// On force le clic sur le canvas à donner le focus
canvas.addEventListener('click', () => { canvas.focus(); });

function drawCenterText(lines, offset=0){
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  let startY = (HEIGHT - lines.length * 34)/2 + offset;
  lines.forEach((l, i) => {
    ctx.font = l[1] ? 'bold 32px Arial' : '18px Arial';
    ctx.fillStyle = l[1] ? '#fff' : '#bbb';
    ctx.fillText(l[0], WIDTH/2, startY + i*34 + 17);
  });
}

function drawWorldDeco(worldIdx, camX) {
  const theme = WORLD_THEMES[worldIdx];

  // 1. DESSIN DES NUAGES PIXEL-ART
  ctx.fillStyle = rgb(theme.clouds);
  for (let i = 0; i < 6; i++) {
    let x = mod((i * 260 - camX * 0.1), WIDTH + 160) - 160;
    let y = 40 + (i % 3) * 30;
    ctx.fillRect(x, y + 10, 90, 20);
    ctx.fillRect(x + 15, y, 60, 25);
    ctx.fillRect(x + 35, y - 8, 30, 10);
  }

  // 2. DESSIN DU DECOR DE FOND (PARALLAXE)
  ctx.fillStyle = rgb(theme.deco);
  if (worldIdx === 0) { // LA VILLE : Immeubles pixel-art fidèles à l'ambiance
    for (let i = 0; i < 24; i++) {
      let w = 80 + (i % 4) * 25;
      let h = 180 + (i % 3) * 70;
      let x = mod((i * 110 - camX * 0.25), WIDTH + w) - w;
      let y = GROUND_Y - h;
      ctx.fillRect(x, y, w, h);
      
      ctx.fillStyle = "rgba(255, 240, 150, 0.25)";
      for (let fx = x + 12; fx < x + w - 15; fx += 22) {
        for (let fy = y + 20; fy < GROUND_Y - 20; fy += 35) {
          if ((fx * fy + i) % 4 !== 0) ctx.fillRect(fx, fy, 8, 12);
        }
      }
      // antenne de toit
      ctx.strokeStyle = 'rgba(20,16,32,0.6)'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(x+w*0.5, y); ctx.lineTo(x+w*0.5, y-18); ctx.stroke();
      // tag graffiti coloré au pied de certains immeubles
      if(i % 3 === 1){
        ctx.fillStyle = 'rgba(60,140,255,0.4)';
        ctx.font = 'bold 16px Arial';
        ctx.fillText('ZKR', x+w*0.5-16, GROUND_Y-16);
      } else if(i % 5 === 0){
        ctx.strokeStyle = 'rgba(220,60,60,0.4)'; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(x+10, GROUND_Y-14); ctx.lineTo(x+w-10, GROUND_Y-30); ctx.stroke();
      }
      ctx.fillStyle = rgb(theme.deco);
    }
  } 
  else if (worldIdx === 1) { // LE DÉSERT : Dunes et pyramides à capuchon doré + hiéroglyphes
    for (let i = 0; i < 8; i++) {
      let size = 180 + (i % 2) * 100;
      let x = mod((i * 300 - camX * 0.15), WIDTH + size) - size;
      ctx.fillStyle = rgb(theme.deco);
      ctx.beginPath();
      ctx.moveTo(x, GROUND_Y);
      ctx.lineTo(x + size / 2, GROUND_Y - size / 1.5);
      ctx.lineTo(x + size, GROUND_Y);
      ctx.fill();
      // capuchon doré au sommet
      ctx.fillStyle = 'rgba(212,175,55,0.55)';
      ctx.beginPath();
      ctx.moveTo(x + size*0.42, GROUND_Y - size/1.5*0.82);
      ctx.lineTo(x + size/2, GROUND_Y - size/1.5);
      ctx.lineTo(x + size*0.58, GROUND_Y - size/1.5*0.82);
      ctx.fill();
      // lignes d'appareillage + petits hiéroglyphes
      ctx.strokeStyle = 'rgba(90,55,20,0.3)'; ctx.lineWidth = 2;
      for(let ly=1; ly<5; ly++){ const yy = GROUND_Y - (size/1.5)*ly/5; const half = size/2*(1-ly/5.5); ctx.beginPath(); ctx.moveTo(x+size/2-half, yy); ctx.lineTo(x+size/2+half, yy); ctx.stroke(); }
      ctx.fillStyle = 'rgba(90,55,20,0.4)';
      ctx.fillRect(x+size*0.44, GROUND_Y-size/1.5*0.4, 5, 14);
      ctx.beginPath(); ctx.arc(x+size*0.53, GROUND_Y-size/1.5*0.32, 4, 0, Math.PI*2); ctx.fill();
    }
  } 
  else if (worldIdx === 2) { // LA FORÊT : Arbres avec mousse, champignons et lucioles
    for (let i = 0; i < 25; i++) {
      let x = mod((i * 90 - camX * 0.3), WIDTH + 80) - 80;
      let h = 140 + (i % 3) * 40;
      ctx.fillStyle = "rgba(50, 30, 20, 0.4)";
      ctx.fillRect(x + 15, GROUND_Y - h, 10, h);
      ctx.fillStyle = rgb(theme.deco);
      ctx.beginPath(); ctx.moveTo(x - 15, GROUND_Y - h + 40); ctx.lineTo(x + 20, GROUND_Y - h - 30); ctx.lineTo(x + 55, GROUND_Y - h + 40); ctx.fill();
      ctx.beginPath(); ctx.moveTo(x - 5, GROUND_Y - h + 90); ctx.lineTo(x + 20, GROUND_Y - h + 20); ctx.lineTo(x + 45, GROUND_Y - h + 90); ctx.fill();
      // mousse sur le tronc
      if(i % 3 === 0){ ctx.fillStyle = 'rgba(120,190,90,0.35)'; ctx.beginPath(); ctx.arc(x+20, GROUND_Y-18, 10, 0, Math.PI*2); ctx.fill(); }
      // petit champignon rouge au pied de certains arbres
      if(i % 5 === 2){
        ctx.fillStyle = '#c94a3d'; ctx.beginPath(); ctx.arc(x+2, GROUND_Y-10, 7, Math.PI, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#f2f7fb'; ctx.fillRect(x-3, GROUND_Y-9, 4, 2); ctx.fillRect(x+5, GROUND_Y-8, 4, 2);
        ctx.fillStyle = '#e8d9b0'; ctx.fillRect(x-1, GROUND_Y-9, 6, 9);
      }
      // luciole/étincelle
      if(i % 4 === 1){ const g = 0.4+0.4*Math.sin(frameTick*0.05+i); ctx.fillStyle = `rgba(200,255,140,${g})`; ctx.beginPath(); ctx.arc(x+35, GROUND_Y-h*0.5, 3, 0, Math.PI*2); ctx.fill(); }
    }
  } 
  else if (worldIdx === 3) { // LA BANQUISE : Blocs de glace géométriques scintillants
    for (let i = 0; i < 12; i++) {
      let w = 130 + (i % 2) * 80;
      let h = 90 + (i % 3) * 50;
      let x = mod((i * 180 - camX * 0.2), WIDTH + w) - w;
      ctx.fillStyle = rgb(theme.deco);
      ctx.beginPath();
      ctx.moveTo(x, GROUND_Y);
      ctx.lineTo(x + w * 0.3, GROUND_Y - h);
      ctx.lineTo(x + w * 0.7, GROUND_Y - h * 1.2);
      ctx.lineTo(x + w, GROUND_Y);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.beginPath(); ctx.moveTo(x + w*0.3, GROUND_Y - h); ctx.lineTo(x + w*0.45, GROUND_Y - h*0.5); ctx.lineTo(x + w*0.55, GROUND_Y - h*0.9); ctx.closePath(); ctx.fill();
      const spark = 0.3+0.5*Math.abs(Math.sin(frameTick*0.04+i*1.3));
      ctx.fillStyle = `rgba(255,255,255,${spark})`;
      ctx.beginPath(); ctx.arc(x + w*0.65, GROUND_Y - h*0.7, 2.4, 0, Math.PI*2); ctx.fill();
    }
  }
}

function drawGroundTexture(worldIdx, r, camX){
  ctx.save();
  ctx.beginPath(); ctx.rect(r.x, r.y, r.w, Math.min(r.h, 90)); ctx.clip();
  if(worldIdx === 0){ // VILLE : joints de trottoir/béton
    ctx.strokeStyle = 'rgba(15,13,22,0.5)'; ctx.lineWidth = 2;
    for(let x = Math.floor(r.x/70)*70; x < r.x+r.w; x += 70){ ctx.beginPath(); ctx.moveTo(x, r.y+8); ctx.lineTo(x, r.y+70); ctx.stroke(); }
    // petit tag graffiti occasionnel
    ctx.fillStyle = 'rgba(60,140,255,0.55)'; ctx.font = 'bold 13px Arial';
    for(let x = Math.floor(r.x/340)*340; x < r.x+r.w; x += 340){ if(mod(x,680)===0) ctx.fillText('ZKR', x+18, r.y+34); }
  } else if(worldIdx === 1){ // DESERT : appareillage de pierres sableuses
    ctx.strokeStyle = 'rgba(110,70,30,0.35)'; ctx.lineWidth = 2;
    for(let x = Math.floor(r.x/64)*64; x < r.x+r.w; x += 64){ ctx.beginPath(); ctx.moveTo(x, r.y+10); ctx.lineTo(x, r.y+55); ctx.stroke(); }
    for(let y = r.y+10; y < r.y+70; y += 22){ ctx.beginPath(); ctx.moveTo(r.x, y); ctx.lineTo(r.x+r.w, y); ctx.stroke(); }
  } else if(worldIdx === 2){ // FORET : mousse et racines
    ctx.fillStyle = 'rgba(90,160,70,0.5)';
    for(let x = Math.floor(r.x/46)*46; x < r.x+r.w; x += 46){ ctx.beginPath(); ctx.arc(x+10, r.y+8, 9, 0, Math.PI); ctx.fill(); }
    ctx.strokeStyle = 'rgba(50,35,20,0.4)'; ctx.lineWidth = 2;
    for(let x = Math.floor(r.x/58)*58; x < r.x+r.w; x += 58){ ctx.beginPath(); ctx.moveTo(x, r.y+16); ctx.lineTo(x+18, r.y+60); ctx.stroke(); }
  } else if(worldIdx === 3){ // BANQUISE : fissures de glace scintillantes
    ctx.strokeStyle = 'rgba(255,255,255,0.55)'; ctx.lineWidth = 1.6;
    for(let x = Math.floor(r.x/95)*95; x < r.x+r.w; x += 95){ ctx.beginPath(); ctx.moveTo(x, r.y+4); ctx.lineTo(x+22, r.y+30); ctx.lineTo(x+8, r.y+55); ctx.stroke(); }
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    for(let x = Math.floor(r.x/60)*60; x < r.x+r.w; x += 60){ ctx.fillRect(x, r.y+4, 3, 3); }
  }
  ctx.restore();
}

function drawPlatformTexture(worldIdx, r){
  ctx.save();
  ctx.beginPath(); ctx.rect(r.x, r.y, r.w, r.h); ctx.clip();
  if(worldIdx === 0){
    ctx.strokeStyle = 'rgba(0,0,0,0.35)'; ctx.lineWidth = 1.4;
    for(let x = r.x+14; x < r.x+r.w; x += 28){ ctx.beginPath(); ctx.moveTo(x, r.y); ctx.lineTo(x, r.y+r.h); ctx.stroke(); }
  } else if(worldIdx === 1){
    ctx.strokeStyle = 'rgba(90,55,20,0.4)'; ctx.lineWidth = 1.4;
    for(let x = r.x+16; x < r.x+r.w; x += 32){ ctx.beginPath(); ctx.moveTo(x, r.y); ctx.lineTo(x, r.y+r.h); ctx.stroke(); }
  } else if(worldIdx === 2){
    ctx.strokeStyle = 'rgba(40,25,15,0.45)'; ctx.lineWidth = 1.4;
    for(let x = r.x; x < r.x+r.w; x += 10){ ctx.beginPath(); ctx.moveTo(x, r.y+2); ctx.lineTo(x, r.y+r.h-2); ctx.stroke(); }
  } else if(worldIdx === 3){
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.beginPath(); ctx.moveTo(r.x+4, r.y+r.h*0.4); ctx.lineTo(r.x+r.w*0.4, r.y+2); ctx.lineTo(r.x+r.w*0.55,r.y+r.h*0.5); ctx.closePath(); ctx.fill();
  }
  ctx.restore();
}

function damagePlayer(){
  // Ne jamais infliger de dégâts si l'état de jeu a déjà changé (évite les vies négatives / crash sur plusieurs hits au même frame)
  if(state !== STATE_PLAYING) return;
  lives--;
  if(lives <= 0){ lives = 0; state = STATE_GAME_OVER; }
  else { player.reset(level.startX, level.startY); }
}

function gameLoop(){
  frameTick++;
  if(state === STATE_PLAYING){
    player.update(keys, level.solids);
    cameraX += ((player.x - WIDTH/3) - cameraX) * 0.1;
    cameraX = Math.max(0, Math.min(cameraX, level.width - WIDTH));

    if(player.y > DEATH_Y) damagePlayer();
    level.coins.forEach(c => { if(!c.taken && Math.hypot(player.x+player.w/2 - c.x, player.y+player.h/2 - c.y) < 35){ c.taken = true; score++; } });
    enemies.forEach(e => {
      if(state !== STATE_PLAYING || !e.alive) return;
      e.update();
      if(rectsOverlap(player.rect, e.rect)){
        if(player.vy > 0 && player.y + player.h - player.vy <= e.y + 15){
          e.hit(); player.vy = -10;
          score += e.alive ? 1 : (e.isBoss ? 20 : 2);
        } else if(player.invincibleTimer <= 0){ damagePlayer(); }
      }
    });
    if(state === STATE_PLAYING){
      level.spikes.forEach(s => { if(state === STATE_PLAYING && rectsOverlap(player.rect, s) && player.invincibleTimer <= 0) damagePlayer(); });
    }
    if(state === STATE_PLAYING && player.x + player.w > level.goalX && Math.abs((player.y + player.h) - level.goalY) < 120){ state = STATE_LEVEL_CLEAR; levelTransitionTimer = 60; }
  } else if(state === STATE_LEVEL_CLEAR){
    levelTransitionTimer--; if(levelTransitionTimer <= 0){ levelIndex++; if(levelIndex>=5){ levelIndex=0; worldIndex++; if(worldIndex>=4){ state=STATE_VICTORY; } else { initLevel(); state=STATE_PLAYING; } } else { initLevel(); state=STATE_PLAYING; } }
  }

  ctx.clearRect(0,0,WIDTH,HEIGHT);
  const theme = WORLD_THEMES[Math.min(worldIndex, WORLD_THEMES.length - 1)];

  if(state === STATE_MENU){
    let g = ctx.createLinearGradient(0,0,0,HEIGHT); g.addColorStop(0, '#140f28'); g.addColorStop(1, '#3c2e6b'); ctx.fillStyle = g; ctx.fillRect(0,0,WIDTH,HEIGHT);
    drawPlayerSprite(WIDTH/2 - PLAYER_WIDTH*0.8, HEIGHT/2 - 150, PLAYER_WIDTH*1.6, PLAYER_HEIGHT*1.6, 1, 0, true, false, frameTick);
    drawCenterText([
      ['ZKR - LE RAPPEUR DU BITUME', true],
      ['Appuie sur ESPACE pour lancer le jeu', false],
      ['Clique n\'importe où sur l\'écran si rien ne se passe', false]
    ], 40);
  } else if(state === STATE_VICTORY){
    // Écran de victoire dédié : on a fini le monde 4, worldIndex peut être hors des bornes de WORLD_THEMES,
    // donc on ne tente plus de dessiner un niveau de jeu ici (ça faisait planter le jeu).
    let g = ctx.createLinearGradient(0,0,0,HEIGHT); g.addColorStop(0, '#1a4d2e'); g.addColorStop(1, '#2e8b57'); ctx.fillStyle = g; ctx.fillRect(0,0,WIDTH,HEIGHT);
  } else {
    let g = ctx.createLinearGradient(0,0,0,HEIGHT); g.addColorStop(0, rgb(theme.bgTop)); g.addColorStop(1, rgb(theme.bgBottom)); ctx.fillStyle = g; ctx.fillRect(0,0,WIDTH,HEIGHT);
    
    drawWorldDeco(worldIndex, cameraX);

    ctx.save(); ctx.translate(-cameraX, 0);
    level.groundRects.forEach(r => { ctx.fillStyle = rgb(theme.ground); ctx.fillRect(r.x, r.y, r.w, r.h); ctx.fillStyle = rgb(theme.groundTop); ctx.fillRect(r.x, r.y, r.w, 10); drawGroundTexture(worldIndex, r, cameraX); });
    level.platformRects.forEach(r => { ctx.fillStyle = rgb(theme.platform); ctx.fillRect(r.x, r.y, r.w, r.h); ctx.fillStyle = rgb(theme.platformTop); ctx.fillRect(r.x, r.y, r.w, 6); drawPlatformTexture(worldIndex, r); });
    ctx.fillStyle = rgb(theme.spike); level.spikes.forEach(r => { for(let x=r.x; x<r.x+r.w; x+=20){ ctx.beginPath(); ctx.moveTo(x, r.y+r.h); ctx.lineTo(x+10, r.y); ctx.lineTo(x+20, r.y+r.h); ctx.fill(); } });
    level.coins.forEach(c => { if(!c.taken){ drawStar(c.x, c.y, 10, 4.5, '#ffd700'); drawStar(c.x, c.y, 6, 2.5, '#fff6b0'); } });
    enemies.forEach(e => {
      if(!e.alive) return;
      ctx.save();
      if(e.hitFlash > 0) ctx.globalAlpha = 0.55;
      if(e.isBoss) drawBossSprite(e.kind, e.x, e.y, e.w, e.h, frameTick, e.dir);
      else drawEnemySprite(e.kind, e.x, e.y, e.w, e.h, frameTick, e.dir);
      ctx.restore();
    });
    // fanion d'arrivée
    ctx.fillStyle = '#3a3a3a'; ctx.fillRect(level.goalX-5, level.goalY-140, 8, 140);
    ctx.fillStyle = rgb(theme.accent);
    ctx.beginPath(); ctx.moveTo(level.goalX+3, level.goalY-140); ctx.lineTo(level.goalX+68, level.goalY-120); ctx.lineTo(level.goalX+3, level.goalY-100); ctx.fill();
    ctx.restore();

    if(player.invincibleTimer <= 0 || player.invincibleTimer % 8 < 5){
      drawPlayerSprite(player.x - cameraX, player.y, player.w, player.h, player.facing, player.vx, player.onGround, player.h === PLAYER_CROUCH_HEIGHT, frameTick);
    }
    
    ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(0,0,WIDTH,50); ctx.fillStyle = '#fff'; ctx.font = 'bold 16px Arial';
    ctx.fillText(`VIES : ${"❤️".repeat(Math.max(0, lives))}   |   SCORE : ${score}`, 20, 30);
    ctx.textAlign = 'right'; ctx.fillText(`${theme.name} - ${LEVEL_NAMES[levelIndex]}`, WIDTH - 20, 30); ctx.textAlign = 'left';

    const boss = enemies.find(e => e.isBoss && e.alive);
    if(boss){
      const barW = 320, barX = (WIDTH-barW)/2, barY = 60;
      ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(barX-14, barY-10, barW+28, 28);
      ctx.font = '16px Arial'; ctx.fillStyle = '#fff'; ctx.textAlign = 'right'; ctx.fillText('💀', barX-2, barY+9); ctx.textAlign='left';
      ctx.fillStyle = '#4a1010'; ctx.fillRect(barX, barY, barW, 12);
      ctx.fillStyle = '#e63333'; ctx.fillRect(barX, barY, barW * (boss.hp/boss.maxHp), 12);
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.strokeRect(barX, barY, barW, 12);
    }

    if(state === STATE_LEVEL_CLEAR) drawCenterText([['NIVEAU REUSSI !', true]]);
  }
  
  if(state === STATE_GAME_OVER) drawCenterText([['GAME OVER', true], ['Appuie sur ESPACE pour rejouer', false]]);
  if(state === STATE_VICTORY) drawCenterText([['VICTOIRE TOTALE !', true], ['Tu as fini le jeu !', false]]);

  requestAnimationFrame(gameLoop);
}

initLevel();
gameLoop();
</script>
</body>
